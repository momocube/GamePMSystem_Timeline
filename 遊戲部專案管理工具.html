function getRole(card,user,admins=[]){
  if(!user||!card)return null;
  if((admins||[]).includes(user))return'admin';
  if(card.assignee===user)return'owner';
  if(card.follower===user)return'tracker';
  if((card.collaborators||[]).includes(user))return'collaborator';
  return null;
}
function getRoles(card,user,admins=[]){
  if(!user||!card)return[];
  const roles=[];
  if((admins||[]).includes(user))roles.push('admin');
  if(card.assignee===user)roles.push('owner');
  if(card.follower===user)roles.push('tracker');
  if((card.collaborators||[]).includes(user))roles.push('collaborator');
  return roles;
}
function can(card,user,admins,field,rolePerms){

function nodePath(nodes,nid){const p=[];let c=nid;while(c){const n=(nodes||{})[c];if(!n)break;p.unshift(n.name);c=n.parentId;}return p.join(' › ');}

function subtreeCards(nodes,cards,nid){if(!nid)return[];const n=(nodes||{})[nid];if(!n)return[];let r=nodeCards(nodes,cards,nid);(n.children||[]).forEach(cid=>{r=r.concat(subtreeCards(nodes,cards,cid))});return r;}
function nodeStats(nodes,cards,nid,statuses){const all=subtreeCards(nodes,cards,nid);return{total:all.length,done:all.filter(c=>(statuses||[]).find(s=>s.id===c.statusId)?.label==='完成').length,overdue:all.filter(c=>isOD(c.dueDate)&&(statuses||[]).find(s=>s.id===c.statusId)?.label!=='完成').length};}

function promoteCard(nodes,cards,cardId,fromNid){
  const from=(nodes||{})[fromNid];if(!from)return null;
  const toNid=from.parentId||null;
  const nn=clone(nodes),nc=clone(cards);
  nn[fromNid].cardRefs=(nn[fromNid].cardRefs||[]).filter(id=>id!==cardId);
  if(toNid){
    if(!(nn[toNid].cardRefs||[]).includes(cardId))nn[toNid].cardRefs=[...(nn[toNid].cardRefs||[]),cardId];
  }
  if(nc[cardId])nc[cardId].nodeId=toNid;
  return{nodes:nn,cards:nc,toNid};
}
function demoteCard(nodes,cards,cardId,fromNid,toChildId){
  const from=(nodes||{})[fromNid];if(!from||(!(from.children||[]).includes(toChildId)))return null;
  const nn=clone(nodes),nc=clone(cards);
  nn[fromNid].cardRefs=(nn[fromNid].cardRefs||[]).filter(id=>id!==cardId);
  if(!(nn[toChildId].cardRefs||[]).includes(cardId))nn[toChildId].cardRefs=[...(nn[toChildId].cardRefs||[]),cardId];
  if(nc[cardId])nc[cardId].nodeId=toChildId;
  return{nodes:nn,cards:nc,toNid:toChildId};
}
function trackDays(card){
  const start=card.trackStart||card.startDate||card.createdAt?.slice(0,10);
  if(!start)return null;
  const s=new Date(start+'T00:00:00');
  const end=card.completedAt?new Date(card.completedAt.slice(0,10)+'T00:00:00'):new Date(today()+'T00:00:00');
  return Math.max(0,Math.round((end-s)/86400000));
}

function useFBStatus(){const[s,setS]=useState('checking');useEffect(()=>{const r=fbRef('.info/connected');const h=r.on('value',snap=>setS(snap.val()?'connected':'disconnected'));return()=>r.off('value',h)},[]);return s;}
function useFB(path,def){
  const[data,setData]=useState(null);
  useEffect(()=>{
    const r=fbRef(path);
    const h=r.on('value',snap=>{
      let v=snap.val();
      if(v===null){
        const isEmpty=Array.isArray(def)?def.length===0:typeof def==='object'&&def!==null&&Object.keys(def).length===0;
        if(!isEmpty)r.set(def);
        setData(def);
      }else{
        if(Array.isArray(def)&&v!==null&&typeof v==='object'&&!Array.isArray(v)){v=Object.values(v);}
        setData(v);
      }
    });
    return()=>r.off('value',h);
  },[path]);
  const set=useCallback(upd=>{
    setData(prev=>{
      const next=typeof upd==='function'?upd(prev??def):upd;
      const toStore=(Array.isArray(next)&&next.length===0)?null:next;
      fbRef(path).set(toStore??null);
      return next;
    });
  },[path]);
  return[data,set];
}

function useNotifs(curUser){
  const[notifs,setNotifs]=useState([]);const[ring,setRing]=useState(false);const prevUser=useRef(curUser);
  useEffect(()=>{
    if(!curUser)return;
    const path=`notifs/${curUser}`;const r=fbRef(path);
    const h=r.on('value',snap=>{
      const val=snap.val();
      if(!val){setNotifs([]);return;}
      const arr=Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>b.createdAt?.localeCompare(a.createdAt||'')||0);
      setNotifs(prev=>{
        if(prevUser.current===curUser&&arr.some(n=>!n.read&&!prev.find(p=>p._key===n._key))){setRing(true);setTimeout(()=>setRing(false),600);}
        return arr;
      });
    });
    prevUser.current=curUser;
    return()=>r.off('value',h);
  },[curUser]);
  const markRead=useCallback(key=>{fbRef(`notifs/${curUser}/${key}`).update({read:true});},[curUser]);
  const markAll=useCallback(()=>{notifs.filter(n=>!n.read).forEach(n=>fbRef(`notifs/${curUser}/${n._key}`).update({read:true}));},[curUser,notifs]);
  const delNotif=useCallback(key=>{fbRef(`notifs/${curUser}/${key}`).remove();},[curUser]);
  return{notifs,ring,markRead,markAll,delNotif};
}

function Toast({msg}){return msg?<div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',background:'#22c55e',color:'#fff',padding:'6px 20px',borderRadius:8,fontSize:13,zIndex:999,fontWeight:600,boxShadow:'0 4px 12px rgba(0,0,0,.2)',pointerEvents:'none'}}>{msg}</div>:null;}
function Locked({ok,children}){if(ok)return children;return<div className="relative"><div style={{opacity:.45,pointerEvents:'none'}}>{children}</div><div className="lock-overlay"><span style={{fontSize:11,color:'#9ca3af'}}>🔒</span></div></div>;}
function InlineEdit({value,onSave,cls='text-xs',disabled=false}){const[ed,setEd]=useState(false);const[v,setV]=useState(value);useEffect(()=>{if(!ed)setV(value);},[value,ed]);if(disabled||!ed)return<span className={`${cls} ${disabled?'':'cursor-text'}`} onDoubleClick={()=>{if(!disabled){setV(value);setEd(true);}}}>{value}</span>;return<input className={`border-b border-indigo-400 outline-none px-1 bg-transparent ${cls}`} value={v} autoFocus onChange={e=>setV(e.target.value)} onClick={e=>e.stopPropagation()} onBlur={()=>{if(v.trim())onSave(v.trim());setEd(false);}} onKeyDown={e=>{if(e.key==='Enter'&&v.trim()){onSave(v.trim());setEd(false);}if(e.key==='Escape')setEd(false);}}/>;}
function NumInput({value,onChange,className=''}){const[l,setL]=useState(String(value??''));useEffect(()=>setL(String(value??'')),[value]);return<input type="text" inputMode="numeric" className={className} value={l} onChange={e=>setL(e.target.value.replace(/[^0-9]/g,''))} onBlur={()=>{const n=l===''?0:Math.max(0,Math.min(9999,parseInt(l,10)));setL(String(n));onChange(n);}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}/>;}

/* 修4：CtxMenu 的 onDelete 直接在關閉前不 trigger selCard */
function CtxMenu({x,y,onArchive,onDelete,onClose}){
  const r=useRef();
  useEffect(()=>{const h=e=>{if(r.current&&!r.current.contains(e.target))onClose()};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[]);
  return(
    <div ref={r} className="fixed z-50 bg-white rounded-lg shadow-xl border border-gray-200 py-1 min-w-36" style={{top:y,left:x}}>
      <button className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50" onClick={()=>{onArchive();onClose();}}>📦 封存</button>
      <hr className="my-1 border-gray-100"/>
      <button className="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50" onClick={()=>{onClose();onDelete();}}>🗑 刪除</button>
    </div>
  );
}

function MentionTA({value,onChange,members,curUser,placeholder,rows=3,className='',onCtrlEnter}){
  const[popup,setPopup]=useState(null);const taRef=useRef(null);
  const cands=popup?.type==='m'?(members||[]).filter(m=>m!==curUser&&m.toLowerCase().includes(popup.q)):[];
  const hc=e=>{onChange(e.target.value);const pos=e.target.selectionStart;const before=e.target.value.slice(0,pos);const ma=before.match(/@(\S*)$/);if(ma)setPopup({type:'m',q:ma[1].toLowerCase(),at:pos-ma[0].length,cur:pos,rect:e.target.getBoundingClientRect()});else setPopup(null);};
  const pick=text=>{const before=value.slice(0,popup.at);const after=value.slice(popup.cur);onChange(before+'@'+text+' '+after);setPopup(null);setTimeout(()=>{if(taRef.current){const p=before.length+1+text.length+1;taRef.current.setSelectionRange(p,p);taRef.current.focus();}},0);};
  return<div className="relative w-full"><textarea ref={taRef} rows={rows} className={className} value={value} placeholder={placeholder} onChange={hc} onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)&&onCtrlEnter){e.preventDefault();onCtrlEnter();}if(popup&&e.key==='Escape')setPopup(null);}} onBlur={()=>setTimeout(()=>setPopup(null),150)}/>
    {popup&&cands.length>0&&<div className="mention-popup" style={{top:(popup.rect?.bottom??0)+4,left:(popup.rect?.left??0)+4}}>{cands.map(m=><button key={m} className="w-full text-left px-3 py-1.5 text-xs hover:bg-indigo-50 flex items-center gap-2" onMouseDown={e=>{e.preventDefault();pick(m);}}><span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold text-xs ${mc(m,members)}`}>{m[0]}</span>{m}</button>)}</div>}
  </div>;
}
function renderCmt(txt,members){if(!txt)return null;return txt.split(/(@\S+)/g).map((p,i)=>{if(p.startsWith('@')){const c=mc(p.slice(1),members||[]);return<span key={i} className={`rounded px-0.5 font-semibold ${c}`}>{p}</span>;}return<span key={i}>{p}</span>;});}

function BellNotif({curUser,members,onOpen}){
  const{notifs,ring,markRead,markAll,delNotif}=useNotifs(curUser);const[open,setOpen]=useState(false);const unread=notifs.filter(n=>!n.read).length;
  const ref2=useRef();useEffect(()=>{if(!open)return;const h=e=>{if(ref2.current&&!ref2.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  return<div className="relative" ref={ref2}><button onClick={()=>setOpen(v=>!v)} className={`relative p-1.5 rounded-lg hover:bg-gray-100 text-gray-600 ${ring?'bell-ring':''}`}><span style={{fontSize:18}}>🔔</span>{unread>0&&<span className="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold leading-none">{unread>9?'9+':unread}</span>}</button>
    {open&&<div className="absolute right-0 top-9 w-80 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 flex flex-col max-h-96"><div className="flex items-center justify-between px-4 py-3 border-b"><span className="font-bold text-sm text-gray-700">🔔 通知</span>{unread>0&&<button onClick={markAll} className="text-xs text-indigo-500 hover:underline">全部已讀</button>}</div><div className="flex-1 overflow-y-auto">{notifs.length===0&&<div className="text-center text-gray-400 text-xs py-8">沒有通知</div>}{notifs.map(n=><div key={n._key} className={`px-4 py-3 border-b text-xs flex gap-2 items-start hover:bg-gray-50 ${n.read?'opacity-60':''}`}><span className="flex-shrink-0 mt-0.5">{n.read?'💬':'🔵'}</span><div className="flex-1 min-w-0"><div className="font-semibold text-gray-700 truncate">{n.taskName}</div><div className="text-gray-500 mt-0.5">{n.author}：<span className="text-gray-700">{n.preview}</span></div><div className="text-gray-400 mt-0.5">{n.createdAt}</div>{n.taskId&&<button onClick={()=>{markRead(n._key);setOpen(false);onOpen&&onOpen(n.taskId)}} className="text-indigo-500 hover:underline mt-1">前往票卡 →</button>}</div><button onClick={()=>delNotif(n._key)} className="text-gray-300 hover:text-red-400 flex-shrink-0">✕</button></div>)}</div></div>}
  </div>;
}

function QNPanel({curUser}){
  const[open,setOpen]=useState(false);
  const[notes,setNotes]=useState(()=>LS.get(NOTES_K(curUser),[]));
  const[newT,setNewT]=useState('');const[col,setCol]=useState(0);
  const lastSeenCount=useRef(notes.length);
  const[hasNew,setHasNew]=useState(false);
  const prev=useRef(curUser);
  useEffect(()=>{if(prev.current!==curUser){prev.current=curUser;const n=LS.get(NOTES_K(curUser),[]);setNotes(n);lastSeenCount.current=n.length;setHasNew(false);}},[curUser]);
  const handleToggle=()=>{setOpen(v=>{if(!v){lastSeenCount.current=notes.length;setHasNew(false);}return!v;});};
  const add=()=>{if(!newT.trim())return;const n={id:uid(),text:newT.trim(),colorIdx:col,createdAt:nowFull()};const next=[n,...notes];setNotes(next);LS.set(NOTES_K(curUser),next);setNewT('');setHasNew(true);};
  const del=id=>{const next=notes.filter(n=>n.id!==id);setNotes(next);LS.set(NOTES_K(curUser),next);};
  return<>
    <div className="qn-toggle" onClick={handleToggle} title="隨手記">
      {hasNew&&!open&&<span className="note-dot mb-1"/>}
      <span style={{fontSize:9,color:'#9ca3af',writingMode:'vertical-rl',letterSpacing:1}}>隨手記</span>
      <span style={{fontSize:13,color:'#6b7280',lineHeight:1,marginTop:4}}>{open?'›':'‹'}</span>
      {notes.length>0&&<span style={{fontSize:9,color:'#a5b4fc',marginTop:2}}>{notes.length}</span>}
    </div>
    <div className={`qn-panel${open?' open':''}`}><div style={{width:340,display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="flex items-center justify-between px-4 py-3 border-b bg-white flex-shrink-0">
        <div className="flex items-center gap-2"><span className="font-bold text-sm text-gray-700">📝 隨手記</span>{notes.length>0&&<span className="bg-indigo-100 text-indigo-700 text-xs rounded-full px-1.5 py-0.5 font-medium">{notes.length}</span>}</div>
        <button onClick={()=>setOpen(false)} className="text-gray-400 hover:text-gray-700 text-lg">✕</button>
      </div>
      <div className="px-3 py-3 border-b flex-shrink-0 bg-gray-50">
        <div className="flex gap-1.5 mb-2">{QCOLORS.map((c,i)=><button key={i} onClick={()=>setCol(i)} style={{background:c.dot,width:18,height:18,borderRadius:'50%',border:i===col?'2px solid #374151':'2px solid transparent',flexShrink:0}}/>)}</div>
        <textarea rows={3} className="w-full border rounded-lg px-2 py-2 text-xs resize-none outline-none focus:border-indigo-400" style={{background:QCOLORS[col].bg}} value={newT} placeholder="Ctrl+Enter 新增" onChange={e=>setNewT(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))add();}}/>
        <div className="flex items-center justify-between mt-1.5"><span className="text-xs text-gray-400">Ctrl+Enter</span><button onClick={add} disabled={!newT.trim()} className="bg-indigo-600 text-white px-3 py-1 rounded text-xs disabled:opacity-40">新增</button></div>
      </div>
      <div className="flex-1 overflow-y-auto px-3 py-2 space-y-2" style={{minHeight:0}}>
        {notes.length===0&&<div className="text-center text-gray-300 text-xs pt-10">尚無隨手記</div>}
        {notes.map(n=>{const c=QCOLORS[n.colorIdx??0];return<div key={n.id} className="rounded-lg border text-xs group" style={{background:c.bg,borderColor:c.dot+'66'}}><div className="flex items-center gap-1.5 px-2 pt-1.5 pb-1"><span style={{width:8,height:8,borderRadius:'50%',background:c.dot,flexShrink:0}}/><span className="text-gray-400 flex-1 truncate">{n.createdAt}</span><button onClick={()=>del(n.id)} className="opacity-0 group-hover:opacity-100 text-red-400">✕</button></div><div className="px-2 pb-2 text-gray-700 whitespace-pre-wrap">{n.text}</div></div>;})}
      </div>
    </div></div>
  </>;
}

/* ══ TaskDetailModal ══ */
function TaskModal({task,statuses,tags,tagC,members,admins,rolePerms,updTask,onClose,curUser}){
  const[nSub,setNSub]=useState('');const[cmt,setCmt]=useState('');const[docLbl,setDocLbl]=useState('');const[docUrl,setDocUrl]=useState('');const[showDoc,setShowDoc]=useState(false);
  const roles=getRoles(task,curUser,admins);
  const C=field=>can(task,curUser,admins,field,rolePerms);
  const ov=isOD(task.dueDate)&&(statuses||[]).find(s=>s.id===task.statusId)?.label!=='完成';
  const gc=id=>((statuses||[]).find(s=>s.id===id)||(statuses||[])[0]||{color:''}).color;
  const addSub=()=>{if(!nSub.trim())return;updTask(task.id,{subtasks:[...(task.subtasks||[]),{id:uid(),name:nSub,statusId:(statuses||[])[0]?.id,createdAt:nowFull(),completedAt:null,startDate:today(),dueDate:''}]});setNSub('');};
  const addCmt=()=>{if(!cmt.trim())return;const c2={id:uid(),author:curUser||'',text:cmt.trim(),createdAt:nowFull()};updTask(task.id,{comments:[...(task.comments||[]),c2]});[...cmt.matchAll(/@(\S+)/g)].map(m=>m[1]).forEach(name=>{if(name!==curUser&&(members||[]).includes(name))sendNotif(name,{taskId:task.id,taskName:task.name,author:curUser,preview:cmt.slice(0,40)});});setCmt('');};
  const addDoc=()=>{if(!docUrl.trim())return;updTask(task.id,{docs:[...(task.docs||[]),{id:uid(),label:docLbl.trim()||docUrl.trim(),url:docUrl.trim()}]});setDocLbl('');setDocUrl('');setShowDoc(false);};
  const setStatus=(id,sid)=>{const st=(statuses||[]).find(s=>s.id===sid);updTask(id,{statusId:sid,completedAt:st?.label==='完成'?nowFull():null});};
  const F=(field,el)=><Locked ok={C(field)}>{el}</Locked>;
  return(
    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4" style={{zIndex:300}} onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl w-full flex overflow-hidden" style={{maxWidth:900,maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}>
        <div className="flex-1 flex flex-col overflow-y-auto border-r min-w-0">
          <div className="flex items-start justify-between px-5 pt-4 pb-3 border-b flex-shrink-0">
            <Locked ok={C('name')}><input className="font-bold text-base text-gray-800 border-none outline-none w-full" value={task.name} onChange={e=>updTask(task.id,{name:e.target.value})}/></Locked>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl ml-3 flex-shrink-0">✕</button>
          </div>
          {roles.length>0&&<div className="px-5 py-2 flex flex-wrap gap-1.5 flex-shrink-0">
            {roles.map(r=>{const ri2=ROLE_LABELS[r];return ri2?<span key={r} className={`inline-flex items-center gap-1 border rounded px-2 py-0.5 text-xs font-semibold ${ri2.c}`}>{ri2.icon} 你是{ri2.label}</span>:null;})}
          </div>}
          <div className="px-5 py-3 grid grid-cols-2 gap-x-4 gap-y-3 text-xs flex-shrink-0">
            <div>{F('statusId',<div><label className="text-gray-400 block mb-0.5">狀態</label><select className={`w-full rounded px-2 py-1 ${gc(task.statusId)}`} value={task.statusId} onChange={e=>setStatus(task.id,e.target.value)}>{(statuses||[]).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>)}</div>
            <div>{F('urgency',<div><label className="text-gray-400 block mb-0.5">緊急程度</label><select className={`w-full rounded px-2 py-1 ${URG_C[task.urgency||'普通']}`} value={task.urgency||'普通'} onChange={e=>updTask(task.id,{urgency:e.target.value})}>{URG_OPTS.map(u=><option key={u.lb}>{u.lb}</option>)}</select></div>)}</div>
            <div>{F('assignee',<div><label className="text-gray-400 block mb-0.5">負責人</label><select className="w-full border rounded px-2 py-1" value={task.assignee||''} onChange={e=>updTask(task.id,{assignee:e.target.value})}><option value=''>--</option>{(members||[]).map(m=><option key={m}>{m}</option>)}</select></div>)}</div>
            <div>{F('follower',<div><label className="text-gray-400 block mb-0.5">追蹤者</label><select className="w-full border rounded px-2 py-1" value={task.follower||''} onChange={e=>updTask(task.id,{follower:e.target.value})}><option value=''>--</option>{(members||[]).map(m=><option key={m}>{m}</option>)}</select></div>)}</div>
            <div>{F('collaborators',<div><label className="text-gray-400 block mb-0.5">協作者</label><select className="w-full border rounded px-2 py-1" value={''} onChange={e=>{if(e.target.value&&!(task.collaborators||[]).includes(e.target.value))updTask(task.id,{collaborators:[...(task.collaborators||[]),e.target.value]})}}><option value=''>+ 加入</option>{(members||[]).filter(m=>m!==task.assignee&&m!==task.follower&&!(task.collaborators||[]).includes(m)).map(m=><option key={m}>{m}</option>)}</select>{(task.collaborators||[]).length>0&&<div className="flex flex-wrap gap-1 mt-1">{(task.collaborators||[]).map(m=><span key={m} className={`inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-semibold ${mc(m,members)}`}>{m}<button onClick={()=>updTask(task.id,{collaborators:(task.collaborators||[]).filter(x=>x!==m)})} className="hover:text-red-500">✕</button></span>)}</div>}</div>)}</div>
            <div>{F('startDate',<div><label className="text-gray-400 block mb-0.5">開始</label><input type="date" className="w-full border rounded px-2 py-1" value={task.startDate||''} onChange={e=>updTask(task.id,{startDate:e.target.value})}/></div>)}</div>
            <div className="col-span-2">{F('dueDate',<div><label className="text-gray-400 block mb-0.5">截止</label><input type="date" className={`w-full border rounded px-2 py-1 ${ov?'border-red-400 bg-red-50':''}`} value={task.dueDate||''} onChange={e=>updTask(task.id,{dueDate:e.target.value})}/>{ov&&<p className="text-red-500 mt-0.5">⚠ 已逾期</p>}</div>)}</div>
            <div className="col-span-2">{F('tags',<div><label className="text-gray-400 block mb-1">組別</label><div className="flex flex-wrap gap-1">{(tags||[]).map(tag=><label key={tag} className={`flex items-center gap-1 rounded px-2 py-0.5 cursor-pointer ${(task.tags||[]).includes(tag)?((tagC||{})[tag]||'bg-gray-100'):'border hover:bg-gray-50'}`}><input type="checkbox" className="hidden" checked={(task.tags||[]).includes(tag)} onChange={e=>updTask(task.id,{tags:e.target.checked?[...(task.tags||[]),tag]:(task.tags||[]).filter(x=>x!==tag)})}/>{tag}</label>)}</div></div>)}</div>
            <div className="col-span-2 text-gray-300 pt-1">建立：{task.createdAt}</div>
          </div>
          <div className="px-5 pb-3 border-t flex-shrink-0">
            <div className="font-semibold text-xs text-gray-600 mt-3 mb-2">⏱ 追蹤天數</div>
            <div className="flex items-center gap-4 bg-indigo-50 border border-indigo-100 rounded-lg p-3">
              <div className="text-center flex-shrink-0"><div className="text-4xl font-extrabold text-indigo-600 leading-none">{trackDays(task)??'—'}</div><div className="text-xs text-indigo-400 mt-0.5">天</div></div>
              <div className="flex-1 space-y-2 text-xs">
                <div className="flex items-center gap-2"><span className="text-gray-400 w-14 flex-shrink-0">起始日</span><Locked ok={C('startDate')}><input type="date" className="border rounded px-2 py-1 bg-white text-xs" value={task.trackStart||task.startDate||task.createdAt?.slice(0,10)||''} onChange={e=>updTask(task.id,{trackStart:e.target.value})}/></Locked>{(task.trackStart&&task.trackStart!==task.startDate)&&<button onClick={()=>updTask(task.id,{trackStart:''})} className="text-gray-400 hover:text-red-400 text-xs">↺ 重設</button>}</div>
                <div className="flex items-center gap-2"><span className="text-gray-400 w-14 flex-shrink-0">結束日</span>{task.completedAt?<span className="text-green-600 font-medium">{task.completedAt.slice(0,10)} ✅</span>:<span className="text-gray-400 italic">計時中</span>}</div>

            </div>

            <div className="font-semibold text-xs text-gray-600 mt-3 mb-2">📎 附件連結</div>
            {(task.docs||[]).map(d=>(
              <div key={d.id} className="flex items-center gap-2 bg-gray-50 border rounded px-2 py-1.5 text-xs group mb-1.5">
                <span>🔗</span><a href={d.url} target="_blank" rel="noopener noreferrer" className="flex-1 text-indigo-600 hover:underline truncate">{d.label||d.url}</a>

              </div>

function GanttView({cards,nodes,nid,statuses,onOpen,onDrop,allCards,groupByChild=false}){
  const td=today();const[ws,setWs]=useState(()=>addD(td,-7));const[scale,setScale]=useState(75);
  const DAYS=180;const COL=Math.round(COL_W*scale/100);
  const dRef=useRef([]);
  const dates=useMemo(()=>{const arr=Array.from({length:DAYS},(_,i)=>addD(ws,i));dRef.current=arr;return arr;},[ws]);
  const sRef=useRef(null);const panRef=useRef(null);const dragSt=useRef(null);const[prev,setPrev]=useState(null);
  const{rows,groups}=useMemo(()=>{
    if(groupByChild&&nid&&nodes&&(nodes[nid]?.children||[]).length>0){
      const childIds=nodes[nid].children||[];
      const gs=childIds.map((cid,idx)=>{const cn=nodes[cid];if(!cn)return null;return{nodeId:cid,nodeName:cn.name,colorIdx:idx,cards:subtreeCards(nodes,cards||{},cid)};}).filter(Boolean);
      const rootOwn=nodeCards(nodes,cards||{},nid);const allRows=[];
      if(rootOwn.length>0){allRows.push({t:'header',label:`📁 ${nodes[nid]?.name||''}（直屬）`,colorIdx:-1});rootOwn.forEach(c=>{allRows.push({t:'c',card:c,colorIdx:-1});(c.subtasks||[]).forEach(sub=>allRows.push({t:'s',card:c,sub,colorIdx:-1}));});}
      gs.forEach(g=>{allRows.push({t:'header',label:`📁 ${g.nodeName}`,colorIdx:g.colorIdx});g.cards.forEach(c=>{allRows.push({t:'c',card:c,colorIdx:g.colorIdx});(c.subtasks||[]).forEach(sub=>allRows.push({t:'s',card:c,sub,colorIdx:g.colorIdx}));});});
      return{rows:allRows,groups:gs};
    }
    const vis=allCards||nodeCards(nodes||{},cards||{},nid);const r=[];vis.forEach(c=>{r.push({t:'c',card:c,colorIdx:0});(c.subtasks||[]).forEach(sub=>r.push({t:'s',card:c,sub,colorIdx:0}));});return{rows:r,groups:[]};
  },[groupByChild,nid,nodes,cards,allCards]);
  useEffect(()=>{if(!sRef.current)return;const i=dRef.current.indexOf(td);if(i>=0)sRef.current.scrollLeft=Math.max(0,i*COL-COL*5);},[ws,COL]);
  const xDate=useCallback(cx=>{if(!sRef.current)return null;const r=sRef.current.getBoundingClientRect();return addD(ws,Math.floor((cx-r.left+sRef.current.scrollLeft-LBL_W)/COL));},[COL,ws]);
  const bPos=useCallback((s,e_)=>{if(!s&&!e_)return null;if(s&&e_){const so=dDiff(ws,s);const eo=dDiff(ws,e_);return{left:LBL_W+so*COL,width:Math.max(COL,(eo-so+1)*COL)};}const o=dDiff(ws,s||e_);return{left:LBL_W+o*COL,width:COL};},[ws,COL]);
  const onMD=useCallback(e=>{
    const hEl=e.target.closest('[data-gh]');const bEl=e.target.closest('[data-gb]');
    if(!hEl&&!bEl){if(!sRef.current)return;panRef.current=e.clientX;sRef.current.style.cursor='grabbing';e.preventDefault();return;}
    const el=hEl||bEl;const bk=el.dataset.gb||el.dataset.gh;const parts=bk.split('::');const cid=parts[0];const sid=parts[1]||null;const ht=hEl?el.dataset.ht:null;
    const allV=allCards||Object.values(cards||{}).filter(c=>!c.archived);const card=allV.find(c=>c.id===cid);if(!card)return;
    const target=sid?(card.subtasks||[]).find(s=>s.id===sid):card;if(!target)return;
    dragSt.current={type:ht==='l'?'resize-l':ht==='r'?'resize-r':'move',cid,sid,origS:target.startDate,origE:target.dueDate,startX:e.clientX,startY:e.clientY,moved:false,card};
    setPrev({cid,sid,start:target.startDate,end:target.dueDate});e.preventDefault();
  },[allCards,cards]);
  const onMM=useCallback(e=>{
    if(dragSt.current){const ds=dragSt.current;const dist=Math.abs(e.clientX-ds.startX)+Math.abs(e.clientY-ds.startY);if(dist>4)ds.moved=true;if(!ds.moved)return;const cd=xDate(e.clientX);if(!cd)return;const dd=dDiff(xDate(ds.startX)||ds.origS,cd);let ns=ds.origS,ne=ds.origE;if(ds.type==='move'){ns=ds.origS?addD(ds.origS,dd):null;ne=ds.origE?addD(ds.origE,dd):null;}else if(ds.type==='resize-l'){ns=ds.origS?addD(ds.origS,dd):null;if(ns&&ne&&ns>=ne)ns=addD(ne,-1);}else if(ds.type==='resize-r'){ne=ds.origE?addD(ds.origE,dd):null;if(ns&&ne&&ne<=ns)ne=addD(ns,1);}setPrev({cid:ds.cid,sid:ds.sid,start:ns,end:ne});return;}
    if(panRef.current!==null&&sRef.current){sRef.current.scrollLeft-=e.clientX-panRef.current;panRef.current=e.clientX;}
  },[xDate]);
  const onMU=useCallback(()=>{if(dragSt.current){const ds=dragSt.current;if(!ds.moved){if(!ds.sid)onOpen(ds.card);}else if(prev){onDrop(ds.cid,ds.sid,prev.start,prev.end);}dragSt.current=null;setPrev(null);return;}if(panRef.current!==null){panRef.current=null;if(sRef.current)sRef.current.style.cursor='grab';}},[prev,onDrop,onOpen]);
  useEffect(()=>{window.addEventListener('mousemove',onMM);window.addEventListener('mouseup',onMU);return()=>{window.removeEventListener('mousemove',onMM);window.removeEventListener('mouseup',onMU);};},[onMM,onMU]);
  const gc=id=>((statuses||[]).find(s=>s.id===id)||(statuses||[])[0]||{color:''}).color;
  return<div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 220px)'}}>
    <div className="flex items-center gap-2 mb-2 flex-wrap flex-shrink-0">

    </div>
    <div className="bg-white rounded shadow flex-1 overflow-hidden">
      <div ref={sRef} className="h-full overflow-auto" style={{cursor:'grab',userSelect:'none'}} onMouseDown={onMD}>

          </div>
          {rows.map((row,ri2)=>{
            if(row.t==='header'){const col=row.colorIdx>=0?nodeColor(row.colorIdx):'#6366f1';return<div key={`hdr-${ri2}`} style={{height:28,display:'flex',alignItems:'center',background:'#f8fafc',borderBottom:'2px solid '+col,position:'relative'}}><div className="border-r px-3 flex items-center gap-2 h-full sticky left-0" style={{width:LBL_W,minWidth:LBL_W,background:'#f8fafc',zIndex:14}}><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:col,flexShrink:0}}/><span className="font-bold text-xs" style={{color:col}}>{row.label}</span></div>{dates.map(d=><div key={d} style={{width:COL,minWidth:COL,background:isHol(d)?'#fef2f2':isWknd(d)?'#fafafa':'',borderRight:'1px solid #f3f4f6'}}/>)}</div>;}
            const pv=prev&&prev.cid===row.card.id&&prev.sid===(row.t==='s'?row.sub.id:null)?prev:null;
            const barColor=groupByChild&&row.colorIdx>=0?nodeColor(row.colorIdx):'#6366f1';
            if(row.t==='c'){const c=row.card;const ov=isOD(c.dueDate)&&(statuses||[]).find(s=>s.id===c.statusId)?.label!=='完成';const sd=pv?pv.start:c.startDate;const ed=pv?pv.end:c.dueDate;const pos=bPos(sd,ed);
              return<div key={c.id+ri2} style={{height:ROW_H,position:'relative'}} className="flex items-center border-b hover:bg-gray-50">
                <div className="border-r px-2 text-xs truncate flex-shrink-0 flex items-center gap-1 h-full sticky left-0" style={{width:LBL_W,minWidth:LBL_W,background:'#fff',zIndex:15}}><span className="truncate cursor-pointer hover:text-indigo-600" onClick={()=>onOpen(c)}>{c.name}</span><UBadge u={c.urgency}/></div>
                {pos&&<div data-gb={c.id} style={{position:'absolute',left:pos.left,width:pos.width,height:22,top:(ROW_H-22)/2,background:pv?'#818cf8':(ov?'#ef4444':barColor),borderRadius:4,zIndex:5,opacity:pv?.85:1,cursor:'grab'}} className="gantt-bar select-none">
                  <div className="gantt-handle gantt-handle-l" data-gh={c.id} data-ht="l"/>
                  <span className="text-white truncate px-2 pointer-events-none" style={{fontSize:9,flex:1,overflow:'hidden'}}>{c.name}</span>
                  <div className="gantt-handle gantt-handle-r" data-gh={c.id} data-ht="r"/>
                </div>}
              </div>;}
            const{card,sub}=row;const ov2=isOD(sub.dueDate);const sd2=pv?pv.start:sub.startDate;const ed2=pv?pv.end:sub.dueDate;const pos2=bPos(sd2,ed2);
            return<div key={sub.id+ri2} style={{height:ROW_H,position:'relative'}} className="flex items-center border-b bg-gray-50/60">
              <div className="border-r px-2 text-xs truncate flex-shrink-0 flex items-center gap-1 h-full sticky left-0" style={{width:LBL_W,minWidth:LBL_W,background:'#f9fafb',zIndex:15}}><span className="w-4 text-gray-300 text-center">└</span><span className="truncate text-gray-600">{sub.name}</span><span className={`text-xs rounded px-1 ${gc(sub.statusId)}`}>{(statuses||[]).find(s=>s.id===sub.statusId)?.label||''}</span></div>
              {pos2&&<div data-gb={`${card.id}::${sub.id}`} style={{position:'absolute',left:pos2.left,width:pos2.width,height:14,top:(ROW_H-14)/2,background:pv?'#a5b4fc':(ov2?'#fca5a5':'#a5b4fc'),borderRadius:3,zIndex:5,opacity:pv?.85:1,cursor:'grab'}} className="gantt-bar select-none">
                <div style={{position:'absolute',top:0,bottom:0,left:0,width:5,cursor:'ew-resize',zIndex:2,borderRadius:'3px 0 0 3px'}} data-gh={`${card.id}::${sub.id}`} data-ht="l"/>
                {pos2.width>40&&<span style={{fontSize:8,flex:1,overflow:'hidden',padding:'0 6px',color:'#312e81',pointerEvents:'none',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{sub.name}</span>}
                <div style={{position:'absolute',top:0,bottom:0,right:0,width:5,cursor:'ew-resize',zIndex:2,borderRadius:'0 3px 3px 0'}} data-gh={`${card.id}::${sub.id}`} data-ht="r"/>
              </div>}
            </div>;
          })}
          {!rows.filter(r=>r.t!=='header').length&&<div className="text-center text-gray-400 py-16">目前沒有任務</div>}
        </div>
      </div>
    </div>
  </div>;
}

function CalView({cards,nodes,nid,statuses,tagC,onOpen,addCard}){
  const td2=today();const[calM,setCalM]=useState(new Date().getMonth());const[calY,setCalY]=useState(new Date().getFullYear());
  const vis=nodeCards(nodes||{},cards||{},nid);
  const byDate=useMemo(()=>{const m={};vis.forEach(c=>{if(c.dueDate){if(!m[c.dueDate])m[c.dueDate]=[];m[c.dueDate].push(c);}});return m;},[vis]);
  const info={first:new Date(calY,calM,1).getDay(),total:new Date(calY,calM+1,0).getDate()};
  const gc=id=>((statuses||[]).find(s=>s.id===id)||(statuses||[])[0]||{color:''}).color;
  const cells=[];const pm=calM===0?12:calM,py=calM===0?calY-1:calY,pmt=new Date(py,pm-1+1,0).getDate();
  for(let i=info.first-1;i>=0;i--){const d=pmt-i;const ds=`${py}-${String(pm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cells.push({d,ds,fade:true,tasks:[]});}
  for(let i=1;i<=info.total;i++){const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;cells.push({d:i,ds,fade:false,isT:ds===td2,hol:isHol(ds),wknd:isWknd(ds),tasks:byDate[ds]||[]});}
  const rem=(7-cells.length%7)%7;const nm2=calM===11?1:calM+2;const ny2=calM===11?calY+1:calY;
  for(let i=1;i<=rem;i++){const ds=`${ny2}-${String(nm2).padStart(2,'0')}-${String(i).padStart(2,'0')}`;cells.push({d:i,ds,fade:true,tasks:[]});}
  const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return<div><div className="flex items-center gap-3 mb-3 select-none"><button onClick={()=>{if(calM===0){setCalM(11);setCalY(y=>y-1);}else setCalM(m=>m-1)}} className="border rounded px-2 py-1 text-sm hover:bg-gray-100">‹</button><span className="font-bold text-base min-w-28 text-center">{calY}年 {MN[calM]}</span><button onClick={()=>{if(calM===11){setCalM(0);setCalY(y=>y+1);}else setCalM(m=>m+1)}} className="border rounded px-2 py-1 text-sm hover:bg-gray-100">›</button><button onClick={()=>{setCalM(new Date().getMonth());setCalY(new Date().getFullYear())}} className="border rounded px-2 py-1 text-xs text-gray-500 hover:bg-gray-100">本月</button></div>
    <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-t overflow-hidden mb-px">{['日','一','二','三','四','五','六'].map(d=><div key={d} className="bg-gray-100 text-center text-xs text-gray-500 py-1 font-semibold">{d}</div>)}</div>
    <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-b overflow-hidden">{cells.map((cell,i)=><div key={i} className={`bg-white min-h-24 p-1 ${cell.hol&&!cell.fade?'bg-red-50':cell.wknd&&!cell.fade?'bg-gray-50':''} ${cell.fade?'opacity-40':''}`}><div className={`text-xs mb-1 w-6 h-6 flex items-center justify-center rounded-full ${cell.isT?'bg-indigo-600 text-white font-bold':cell.hol?'text-red-500':cell.wknd?'text-gray-400':'text-gray-600'}`}>{cell.d}</div>{!cell.fade&&cell.tasks.map(t=><div key={t.id} onClick={()=>onOpen(t)} className={`text-xs rounded px-1 py-0.5 mb-0.5 cursor-pointer truncate ${gc(t.statusId)} hover:brightness-95`}>{t.name}</div>)}{!cell.fade&&addCard&&<button onClick={()=>addCard(cell.ds)} className="text-gray-300 hover:text-indigo-500 text-xs w-full text-left px-1 mt-0.5">+</button>}</div>)}</div>
  </div>;
}

/* ══ 修5：任務總覽 — 修正佈局不被壓縮 ══ */
function TreeOverview({nodes,cards,statuses,members,tagC,admins,curUser,onOpen,updCard,setCurNid,setView}){
  const[search,setSearch]=useState('');const[fSt,setFSt]=useState('全部');const[fAs,setFAs]=useState('全部');
  const rootNodeIds=useMemo(()=>Object.values(nodes||{}).filter(n=>!n.parentId).map(n=>n.id),[nodes]);
  const[expanded,setExpanded]=useState(()=>{const all={};Object.keys(nodes||{}).forEach(k=>{all[k]=true;});return all;});
  const match=c=>{if(fSt!=='全部'&&c.statusId!==fSt)return false;if(fAs!=='全部'&&c.assignee!==fAs)return false;if(search&&c.name.toLowerCase().indexOf(search.toLowerCase())<0)return false;return true;};

  // 修5：改用 table 佈局替代 grid，避免 grid 欄位被壓縮
  function CardTableHeader({indent}){
    return(
      <div style={{display:'flex',paddingLeft:indent,paddingRight:16,paddingTop:6,paddingBottom:6,background:'#f8fafc',borderTop:'1px solid #e5e7eb',borderBottom:'1px solid #e5e7eb',gap:0}}>
        <div style={{flex:'0 0 36%',fontSize:11,fontWeight:600,color:'#9ca3af'}}>任務名稱</div>
        <div style={{flex:'0 0 14%',fontSize:11,fontWeight:600,color:'#9ca3af'}}>狀態</div>
        <div style={{flex:'0 0 10%',fontSize:11,fontWeight:600,color:'#9ca3af'}}>緊急</div>
        <div style={{flex:'0 0 14%',fontSize:11,fontWeight:600,color:'#9ca3af'}}>負責人</div>
        <div style={{flex:'0 0 10%',fontSize:11,fontWeight:600,color:'#9ca3af'}}>截止</div>
        <div style={{flex:'1',fontSize:11,fontWeight:600,color:'#9ca3af'}}>組別</div>
      </div>
    );
  }
  function CardMiniRow({c,indent,onOpen}){
    const ov=isOD(c.dueDate)&&(statuses||[]).find(s=>s.id===c.statusId)?.label!=='完成';
    const stLabel=(statuses||[]).find(s=>s.id===c.statusId)?.label||'';
    const stColor=(statuses||[]).find(s=>s.id===c.statusId)?.color||'';
    const role=getRole(c,curUser,admins);const ri=role?ROLE_LABELS[role]:null;
    return(
      <div className="cursor-pointer hover:bg-indigo-50 transition-colors"
        style={{display:'flex',paddingLeft:indent,paddingRight:16,paddingTop:9,paddingBottom:9,borderTop:'1px solid #f1f5f9',alignItems:'center',gap:0}}
        onClick={()=>onOpen(c)}>
        <div style={{flex:'0 0 36%',minWidth:0,display:'flex',alignItems:'center',gap:6,paddingRight:8}}>
          <span style={{fontSize:12,flexShrink:0,color:'#d1d5db'}}>🎫</span>
          <span style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:ov?'#dc2626':'#1f2937'}}>{c.name}</span>
          {ov&&<span style={{color:'#f87171',fontSize:11,flexShrink:0}}>⚠</span>}
          {ri&&<span className={`border rounded px-1 flex-shrink-0 ${ri.c}`} style={{fontSize:9}}>{ri.icon}</span>}
        </div>
        <div style={{flex:'0 0 14%',paddingRight:6}}>
          {stLabel?<span className={`rounded px-2 py-0.5 text-xs font-medium whitespace-nowrap ${stColor}`}>{stLabel}</span>:<span style={{fontSize:12,color:'#d1d5db'}}>—</span>}
        </div>
        <div style={{flex:'0 0 10%',paddingRight:6}}>
          {c.urgency&&c.urgency!=='普通'?<span className={`rounded px-1.5 py-0.5 text-xs font-medium whitespace-nowrap ${URG_C[c.urgency]||''}`}>{c.urgency}</span>:<span style={{fontSize:12,color:'#d1d5db'}}>—</span>}
        </div>
        <div style={{flex:'0 0 14%',paddingRight:6}}>
          {c.assignee?<span className={`rounded-full px-2 py-0.5 text-xs font-medium whitespace-nowrap ${mc(c.assignee,members||[])}`}>{c.assignee}</span>:<span style={{fontSize:12,color:'#d1d5db'}}>—</span>}
        </div>
        <div style={{flex:'0 0 10%',paddingRight:6}}>
          <span style={{fontSize:13,whiteSpace:'nowrap',color:ov?'#ef4444':'#6b7280',fontWeight:ov?600:'normal'}}>{c.dueDate?fmt(c.dueDate):'—'}</span>
        </div>
        <div style={{flex:'1',display:'flex',flexWrap:'wrap',gap:3}}>
          {(c.tags||[]).length>0
            ?(c.tags||[]).map(t=><span key={t} className={`rounded px-1.5 py-0.5 text-xs ${(tagC||{})[t]||'bg-gray-100 text-gray-600'}`}>{t}</span>)
            :<span style={{fontSize:12,color:'#d1d5db'}}>—</span>}
        </div>
      </div>
    );
  }
  function renderInnerBlock(nid,depth,accentColor){
    const n=(nodes||{})[nid];if(!n)return null;
    const exp=expanded[nid]!==false;const hasK=(n.children||[]).length>0;
    const here=nodeCards(nodes||{},cards||{},nid).filter(match);
    const st2=nodeStats(nodes||{},cards||{},nid,statuses);const indent=(depth-1)*14;
    return(
      <div key={nid}>
        <div className="flex items-center gap-2 cursor-pointer select-none group hover:bg-gray-50 transition-colors"
          style={{paddingLeft:16+indent,paddingRight:14,paddingTop:5,paddingBottom:5,borderTop:'1px solid #f1f5f9',borderLeft:`3px solid ${accentColor}22`}}
          onClick={()=>setExpanded(p=>({...p,[nid]:!exp}))}>
          <span style={{color:'#9ca3af',width:10,fontSize:9,flexShrink:0}}>{(hasK||here.length>0)?(exp?'▾':'▸'):''}</span>
          <span style={{fontSize:11,flexShrink:0}}>📂</span>
          <span className={`flex-1 truncate font-semibold ${depth===1?'text-sm text-gray-700':'text-xs text-gray-600'}`}>{n.name}</span>
          <div className="flex items-center gap-2 flex-shrink-0 opacity-60 group-hover:opacity-100">
            {st2.total>0&&<span className="text-xs font-medium text-gray-500">{st2.total}</span>}
            {st2.overdue>0&&<span className="text-red-400 text-xs">⚠{st2.overdue}</span>}
            <button className="text-indigo-400 hover:text-indigo-600 text-xs border border-indigo-200 rounded px-1.5 py-0.5 hover:bg-indigo-50 opacity-0 group-hover:opacity-100" onClick={e=>{e.stopPropagation();setCurNid(nid);setView('board');}}>→</button>
          </div>
        </div>
        {exp&&<>
          {here.length>0&&<CardTableHeader indent={indent+28}/>}
          {here.map(c=><CardMiniRow key={c.id} c={c} indent={indent+28} onOpen={onOpen}/>)}
          {(n.children||[]).map(cid=>renderInnerBlock(cid,depth+1,accentColor))}
        </>}
      </div>
    );
  }
  function renderRootBlock(nid,idx){
    const n=(nodes||{})[nid];if(!n)return null;
    const exp=expanded[nid]!==false;const st2=nodeStats(nodes||{},cards||{},nid,statuses);
    const pct=st2.total>0?Math.round(st2.done/st2.total*100):0;
    const hereRoot=nodeCards(nodes||{},cards||{},nid).filter(match);
    const ACCENT_COLORS=['#6366f1','#ec4899','#10b981','#f59e0b','#8b5cf6','#06b6d4','#f43f5e'];
    const accent=ACCENT_COLORS[idx%ACCENT_COLORS.length];
    return(
      <div key={nid} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
        <div className="flex items-center gap-3 cursor-pointer select-none hover:bg-gray-50/80 transition-colors px-5 py-4" style={{borderLeft:`5px solid ${accent}`}} onClick={()=>setExpanded(p=>({...p,[nid]:!exp}))}>
          <span style={{color:'#9ca3af',fontSize:11,width:12,flexShrink:0}}>{exp?'▾':'▸'}</span>
          <span style={{fontSize:20,flexShrink:0}}>📁</span>
          <span className="text-xl font-extrabold text-gray-800 flex-1 truncate">{n.name}</span>
          <div className="flex items-center gap-3 flex-shrink-0">
            {st2.total>0&&<>
              <span className="text-sm font-bold" style={{color:accent}}>{st2.total} 筆</span>
              {st2.done>0&&<span className="text-xs text-green-600 font-semibold">✅ {st2.done}</span>}
              {st2.overdue>0&&<span className="text-xs text-red-500 font-semibold">⚠ {st2.overdue}</span>}
              <div className="flex items-center gap-1.5" style={{width:56}}><PBar pct={pct} h={5}/><span style={{fontSize:10,fontWeight:700,color:pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444',minWidth:28,textAlign:'right'}}>{pct}%</span></div>
            </>}
            <button className="text-xs border rounded px-2 py-1 font-medium hover:bg-indigo-50 transition-colors" style={{color:accent,borderColor:accent+'55',fontSize:11}} onClick={e=>{e.stopPropagation();setCurNid(nid);setView('board');}}>進入 →</button>
          </div>
        </div>
        {exp&&<div style={{borderTop:'1px solid #f1f5f9'}}>
          <CardTableHeader indent={20}/>
          {hereRoot.map(c=><CardMiniRow key={c.id} c={c} indent={20} onOpen={onOpen}/>)}
          {(n.children||[]).map(cid=>renderInnerBlock(cid,1,accent))}
          {hereRoot.length===0&&(n.children||[]).length===0&&<div className="px-6 py-3 text-xs text-gray-300 italic">此節點尚無任務</div>}
        </div>}
      </div>
    );
  }
  const allCards=useMemo(()=>Object.values(cards||{}).filter(c=>!c.archived),[cards]);
  const stats={total:allCards.length,done:allCards.filter(c=>(statuses||[]).find(s=>s.id===c.statusId)?.label==='完成').length,overdue:allCards.filter(c=>isOD(c.dueDate)&&(statuses||[]).find(s=>s.id===c.statusId)?.label!=='完成').length};
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',minHeight:0}}>
      <div className="grid grid-cols-3 gap-3 mb-4 flex-shrink-0">{[{v:stats.total,l:'全部任務',c:'text-indigo-600',bg:'bg-indigo-50'},{v:stats.done,l:'已完成',c:'text-green-600',bg:'bg-green-50'},{v:stats.overdue,l:'逾期中',c:'text-red-500',bg:'bg-red-50'}].map(x=><div key={x.l} className={`rounded-xl shadow-sm p-4 text-center ${x.bg} border border-gray-100`}><div className={`text-3xl font-extrabold ${x.c}`}>{x.v}</div><div className="text-xs text-gray-500 mt-0.5 font-medium">{x.l}</div></div>)}</div>
      <div className="flex items-center gap-2 mb-4 flex-wrap flex-shrink-0">
        <input className="border rounded-lg px-3 py-1.5 text-xs w-44 bg-white" placeholder="🔍 搜尋任務..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="border rounded-lg px-2 py-1.5 text-xs bg-white" value={fAs} onChange={e=>setFAs(e.target.value)}><option value="全部">全部負責人</option>{(members||[]).map(m=><option key={m}>{m}</option>)}</select>
        <select className="border rounded-lg px-2 py-1.5 text-xs bg-white" value={fSt} onChange={e=>setFSt(e.target.value)}><option value="全部">全部狀態</option>{(statuses||[]).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select>
        <button onClick={()=>{const all={};Object.keys(nodes||{}).forEach(k=>all[k]=true);setExpanded(all);}} className="border rounded-lg px-2.5 py-1.5 text-xs text-gray-600 hover:bg-gray-100 bg-white">全展開</button>
        <button onClick={()=>setExpanded({})} className="border rounded-lg px-2.5 py-1.5 text-xs text-gray-600 hover:bg-gray-100 bg-white">全收合</button>
      </div>
      <div style={{flex:1,overflowY:'auto',paddingRight:2,minHeight:0}}>
        {rootNodeIds.length===0?<div className="bg-white rounded-xl shadow text-center text-gray-400 py-16">尚無任務節點</div>:rootNodeIds.map((nid,idx)=>renderRootBlock(nid,idx))}
      </div>
    </div>
  );
}

  const visCards=useMemo(()=>{let vc=nodeCards(nodes||{},cards||{},curNid);if(fSt!=='全部')vc=vc.filter(c=>c.statusId===fSt);if(fAs!=='全部')vc=vc.filter(c=>c.assignee===fAs);return vc;},[nodes,cards,curNid,fSt,fAs]);
  const st=useMemo(()=>curNid?nodeStats(nodes||{},cards||{},curNid,statuses):{total:0,done:0,overdue:0},[nodes,cards,curNid,statuses]);
  const hasChildNodes=curNid&&(nodes||{})[curNid]&&((nodes||{})[curNid].children||[]).length>0;

  const updCard=useCallback((id,patch,isNew=false)=>{
    if(isNew){
      setCards(prev=>({...(prev||{}),[id]:patch}));
      if(patch.nodeId){setNodes(prev=>{const nn={...(prev||{})};if(nn[patch.nodeId])nn[patch.nodeId]={...nn[patch.nodeId],cardRefs:[...(nn[patch.nodeId].cardRefs||[]),id]};return nn;});}
    }else{
      setCards(prev=>{const next={...(prev||{})};if(!next[id])return prev;next[id]={...next[id],...patch};return next;});
      setSelCard(s=>s&&s.id===id?{...s,...patch}:s);
    }
  },[setCards,setNodes]);

  // 修4：delCard 先清除 selCard，再刪除
  const delCard=useCallback(id=>{
    setSelCard(s=>s&&s.id===id?null:s);
    setCards(prev=>{const next={...(prev||{})};delete next[id];return next;});
    setNodes(prev=>{const nn=clone(prev||{});Object.values(nn).forEach(n=>{n.cardRefs=(n.cardRefs||[]).filter(r=>r!==id)});return nn;});
  },[setCards,setNodes]);

  const arcCard=useCallback(id=>{updCard(id,{archived:true});setSelCard(s=>s&&s.id===id?null:s);},[updCard]);

  // 修3：promote 後若 toNid=null，不切換到 null（字卡仍存在於根層卡片）
  const handlePro=useCallback(cardId=>{
    const res=promoteCard(nodes||{},cards||{},cardId,curNid);
    if(!res){showT('⚠ 已在根層');return;}
    setNodes(res.nodes);setCards(res.cards);
    const destName=res.toNid?(nodes||{})[res.toNid]?.name:'根目錄';
    showT(`↑ 已傳遞到「${destName}」`);
    if(res.toNid!==null)setCurNid(res.toNid);
    // toNid===null 時保持在目前節點，讓使用者看到字卡已消失（正確移到根層）
  },[nodes,cards,curNid,setNodes,setCards,showT]);

  const handleDem=useCallback((cardId,toChildId)=>{const res=demoteCard(nodes||{},cards||{},cardId,curNid,toChildId);if(!res){showT('⚠ 無法下放');return;}setNodes(res.nodes);setCards(res.cards);showT(`↓ 已下放到「${(nodes||{})[toChildId]?.name}」`);setCurNid(toChildId);},[nodes,cards,curNid,setNodes,setCards,showT]);
  const addNode=()=>{if(!newNName.trim())return;const id='n_'+uid();setNodes(prev=>{const next={...(prev||{}),[id]:{id,name:newNName.trim(),parentId:curNid||null,children:[],cardRefs:[]}};if(curNid&&next[curNid])next[curNid]={...next[curNid],children:[...(next[curNid].children||[]),id]};return next;});if(!curNid)setRootNodes(prev=>[...(prev||[]),id]);setNewNName('');setShowNewN(false);};
  const delNode=nid=>{const n=(nodes||{})[nid];if(!n||(n.children||[]).length||(n.cardRefs||[]).length)return;setNodes(prev=>{const next={...(prev||{})};delete next[nid];if(n.parentId&&next[n.parentId])next[n.parentId]={...next[n.parentId],children:(next[n.parentId].children||[]).filter(id=>id!==nid)};return next;});if(!n.parentId)setRootNodes(prev=>(prev||[]).filter(id=>id!==nid));if(curNid===nid)setCurNid(n.parentId||null);};
  const renameNode=(nid,name)=>setNodes(prev=>{const next={...(prev||{})};if(next[nid])next[nid]={...next[nid],name};return next;});
  const onCardDrop=useCallback((cardId,subId,ns,ne)=>{if(subId){updCard(cardId,{subtasks:(((cards||{})[cardId])?.subtasks||[]).map(s=>s.id===subId?{...s,startDate:ns,dueDate:ne}:s)});}else{const up={};if(ns)up.startDate=ns;if(ne)up.dueDate=ne;updCard(cardId,up);}},[updCard,cards]);

  const onSDD=useCallback((nid,e)=>{e.stopPropagation();dragNid.current=nid;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',nid);setSDrag(nid);},[]);
  const onSDO=useCallback((nid,e)=>{e.preventDefault();e.stopPropagation();if(dragNid.current&&dragNid.current!==nid){dragOver.current=nid;setSOvr(nid);}},[]);
  const onSDE=useCallback(()=>{dragNid.current=null;dragOver.current=null;setSDrag(null);setSOvr(null);},[]);
  const onSDs=useCallback((nid,e)=>{
    e.preventDefault();e.stopPropagation();
    const dropEl=e.target.closest('[data-nid]');const dropNid=dropEl?dropEl.getAttribute('data-nid'):nid;
    const from=dragNid.current;dragNid.current=null;dragOver.current=null;setSDrag(null);setSOvr(null);
    if(!from||from===dropNid)return;
    const fromNode=(nodes||{})[from];const toNode=(nodes||{})[dropNid];if(!fromNode||!toNode)return;
    const isDesc=(parentId,targetId)=>{let cur=parentId;while(cur){if(cur===targetId)return true;cur=(nodes||{})[cur]?.parentId;}return false;};
    if(isDesc(dropNid,from))return;
    const fromPid=fromNode.parentId??null;const toPid=toNode.parentId??null;const isSame=fromPid===toPid;
    setNodes(prev=>{const nn=clone(prev||{});if(fromPid)nn[fromPid]={...nn[fromPid],children:(nn[fromPid].children||[]).filter(id=>id!==from)};
      if(isSame){if(fromPid!==null){const kids=[...(nn[fromPid]?.children||[])];const tiIdx=kids.indexOf(dropNid);kids.splice(tiIdx>=0?tiIdx:kids.length,0,from);nn[fromPid]={...nn[fromPid],children:kids};}}
      else{nn[from]={...nn[from],parentId:dropNid};nn[dropNid]={...nn[dropNid],children:[...(nn[dropNid].children||[]),from]};}
      return nn;});
    if(isSame&&fromPid===null){setRootNodes(prev=>{const arr=[...(prev||[])];const fi=arr.indexOf(from);const ti=arr.indexOf(dropNid);if(fi<0||ti<0)return prev;arr.splice(fi,1);arr.splice(ti,0,from);return arr;});}
    else if(!isSame&&fromPid===null){setRootNodes(prev=>(prev||[]).filter(id=>id!==from));}
  },[nodes,setNodes,setRootNodes]);

  function renderTree(nids,depth){
    depth=depth||0;
    return(nids||[]).map(nid=>{
      const n=(nodes||{})[nid];if(!n)return null;
      const isA=curNid===nid&&['board','list','gantt','calendar'].includes(view);
      const hasK=(n.children||[]).length>0;const exp=sideExp[nid]!==false;
      const ss=nodeStats(nodes||{},cards||{},nid,statuses);
      const isDragging=sDrag===nid;const isOver=sOver===nid&&sDrag!==nid;
      const overNode=isOver?(nodes||{})[sDrag]:null;const isSameLevel=isOver&&(overNode?.parentId??null)===(n.parentId??null);
      const overStyle=isOver?(isSameLevel?'border-t-2 border-indigo-500':'ring-2 ring-green-400 bg-green-50'):'';
      return(
        <div key={nid}>
          <div draggable data-nid={nid} onDragStart={e=>onSDD(nid,e)} onDragOver={e=>onSDO(nid,e)} onDrop={e=>onSDs(nid,e)} onDragEnd={onSDE}
            className={`flex items-center gap-1 rounded cursor-pointer mx-1 my-0.5 group transition-colors ${isDragging?'opacity-40':''} ${overStyle} ${isA?'bg-indigo-600 text-white':'text-gray-600 hover:bg-gray-200'}`}
            style={{paddingTop:4,paddingBottom:4,paddingRight:6,paddingLeft:8+depth*14}}
            onClick={e=>{e.stopPropagation();setCurNid(nid);if(!['board','list','gantt','calendar'].includes(view))setView('board');}}>
            <span style={{color:isA?'#c7d2fe':'#9ca3af',width:14,textAlign:'center',fontSize:10,flexShrink:0,cursor:'pointer'}} onClick={e=>{e.stopPropagation();setSideExp(p=>({...p,[nid]:!exp}));}}>{hasK?(exp?'▼':'▶'):''}</span>
            <span className="text-sm flex-shrink-0">📁</span>
            <InlineEdit value={n.name} cls={`text-xs flex-1 truncate ${isA?'text-white':''}`} onSave={v=>renameNode(nid,v)}/>
            {ss.total>0&&<span className={`text-xs rounded-full px-1.5 flex-shrink-0 ${isA?'bg-indigo-500 text-indigo-100':'bg-gray-200 text-gray-500'}`}>{ss.total}</span>}
            <button onClick={e=>{e.stopPropagation();delNode(nid);}} className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 flex-shrink-0 text-xs">✕</button>
          </div>
          {hasK&&exp&&renderTree(n.children,depth+1)}
        </div>
      );
    });
  }

  const syncCard=selCard?(cards||{})[selCard.id]||selCard:null;
  const isPV=['board','list','gantt','calendar'].includes(view);
  const isRoot=!curNid&&isPV;
  const VIEWS=[{id:'board',l:'📋 看板'},{id:'list',l:'📄 列表'},{id:'gantt',l:'📊 甘特圖'},{id:'calendar',l:'📅 日曆'}];
  if(!loaded)return<Loading/>;

  return(
    <div className="flex h-screen bg-gray-50 text-sm overflow-hidden">
      <Toast msg={toast}/>
      <div className="w-52 bg-gray-100 flex flex-col overflow-y-auto flex-shrink-0 border-r border-gray-200">
        <div className="px-3 py-2.5 border-b bg-white"><div className="font-bold text-gray-800 text-sm mb-1">🎮 閃動格子 遊戲部</div><FBDot s={fbSt}/></div>
        <div className="px-3 py-2 border-b bg-gray-50">
          <div className="flex items-center gap-1.5 mb-1"><span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${mc(curUser,members||[])}`}>{curUser[0]}</span><select className="flex-1 border rounded px-1 py-0.5 text-xs bg-white" value={curUser} onChange={e=>setCurUser(e.target.value)}>{(members||[]).map(m=><option key={m}>{m}</option>)}</select></div>
          {(admins||[]).includes(curUser)&&<span className="text-xs text-red-600 font-bold px-1">👑 管理員</span>}
          <div className="text-xs text-gray-400 px-1">（僅存本機）</div>
        </div>
        <div className="flex-1 overflow-y-auto py-2">
          <div className={`flex items-center gap-1 px-3 py-1.5 rounded cursor-pointer mx-1 mb-1 ${!curNid&&isPV?'bg-indigo-600 text-white':'text-gray-600 hover:bg-gray-200'}`} onClick={()=>{setCurNid(null);setView('board');}}>
            <span className="text-sm">🏠</span><span className="text-xs font-medium">根目錄 / 任務總覽</span>
          </div>
          {renderTree(rootNodes||[],0)}
          {showNewN
            ?<div className="mx-2 mt-2 flex gap-1"><input autoFocus className="flex-1 bg-white text-xs rounded px-1.5 border" value={newNName} onChange={e=>setNewNName(e.target.value)} placeholder="節點名稱" onKeyDown={e=>e.key==='Enter'&&addNode()}/><button onClick={addNode} className="bg-indigo-600 text-white text-xs rounded px-2">確認</button><button onClick={()=>setShowNewN(false)} className="text-red-400 text-xs">✕</button></div>
            :<div className="px-3 py-1.5 text-gray-400 text-xs cursor-pointer hover:text-gray-600" onClick={()=>setShowNewN(true)}>+ 新增節點</div>}
        </div>
        <div className="p-2 border-t space-y-0.5">
          {[{id:'myWork',l:'👤 個人工作區'},{id:'weekly',l:'📊 週進度'},{id:'quality',l:'🔬 良率檢測'}].map(v=>(
            <div key={v.id} className={`px-2 py-1.5 rounded cursor-pointer text-xs ${view===v.id?'bg-indigo-600 text-white':'text-gray-600 hover:bg-gray-200'}`} onClick={()=>setView(v.id)}>{v.l}</div>
          ))}
          <div className="px-2 py-1.5 rounded cursor-pointer text-xs text-gray-600 hover:bg-gray-200" onClick={()=>setShowArchive(true)}>📦 封存項目</div>
          <div className="px-2 py-1.5 rounded cursor-pointer text-xs text-green-600 font-medium hover:bg-green-50" onClick={()=>{
            firebase.database().ref('/').once('value').then(snap=>{
              const data=JSON.stringify(snap.val(),null,2);
              const blob=new Blob([data],{type:'application/json'});
              const a=document.createElement('a');
              a.href=URL.createObjectURL(blob);
              const d=new Date();
              a.download=`遊戲部數據匯出_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
              a.click();
              showT('✅ 數據已匯出！拖進 Claude 即可產生報表');
            }).catch(()=>showT('⚠ 匯出失敗，請確認網路連線'));
          }}>📤 匯出報表數據</div>
          {(admins||[]).includes(curUser)&&<div className="px-2 py-1.5 rounded cursor-pointer text-xs text-indigo-600 font-medium hover:bg-indigo-50" onClick={()=>setShowSettings(true)}>⚙️ 設定</div>}
        </div>
      </div>

      <div className="flex-1 flex flex-col overflow-hidden min-w-0">
        <div className="bg-white border-b px-4 py-2 flex items-center gap-3 flex-shrink-0 flex-wrap">
          {isPV&&<div className="flex items-center gap-1 text-xs font-medium text-gray-700 flex-shrink-0"><button onClick={()=>setCurNid(null)} className={`hover:text-indigo-600 ${!curNid?'font-bold text-gray-800':'text-indigo-500'}`}>🏠</button>{bc.map((n,i)=><span key={n.id} className="flex items-center gap-1"><span className="text-gray-300">›</span><button onClick={()=>setCurNid(n.id)} className={`${i===bc.length-1?'font-bold text-gray-800':'text-indigo-500 hover:underline'}`}>{n.name}</button></span>)}</div>}
          {isPV&&curNid&&<div className="flex gap-1">{VIEWS.map(t=><button key={t.id} onClick={()=>setView(t.id)} className={`px-3 py-1 rounded text-xs font-medium ${view===t.id?'bg-indigo-600 text-white':'text-gray-500 hover:bg-gray-100'}`}>{t.l}</button>)}</div>}
          {isPV&&curNid&&view!=='gantt'&&view!=='calendar'&&<div className="flex gap-1 flex-wrap items-center"><select className="border rounded px-2 py-1 text-xs" value={fSt} onChange={e=>setFSt(e.target.value)}><option value="全部">全部狀態</option>{(statuses||[]).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select><select className="border rounded px-2 py-1 text-xs" value={fAs} onChange={e=>setFAs(e.target.value)}><option value="全部">全部負責人</option>{(members||[]).map(m=><option key={m}>{m}</option>)}</select></div>}
          {!isPV&&<span className="font-semibold text-gray-700 text-sm">{{myWork:'👤 個人工作區',weekly:'📊 遊戲組週進度',quality:'🔬 良率檢測'}[view]||''}</span>}
          {isRoot&&<span className="font-semibold text-gray-700 text-sm">🗺 任務總覽</span>}
          <div className="ml-auto flex items-center gap-2">
            <span title={curUser} className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${mc(curUser,members||[])}`}>{curUser[0]}</span>
            <BellNotif curUser={curUser} members={members||[]} onOpen={id=>{const c=(cards||{})[id];if(c)setSelCard(c);}}/>
          </div>
        </div>

        <div className="flex-1 overflow-auto p-4">
          {isRoot&&<TreeOverview nodes={nodes||{}} cards={cards||{}} statuses={statuses||[]} members={members||[]} tagC={tagC||{}} admins={admins||[]} curUser={curUser} onOpen={setSelCard} updCard={updCard} setCurNid={setCurNid} setView={setView}/>}
          {isPV&&curNid&&<>
            <div className="grid grid-cols-3 gap-3 mb-4">{[{v:st.total,l:'全部',c:'text-indigo-600'},{v:st.done,l:'完成',c:'text-green-600'},{v:st.overdue,l:'逾期',c:'text-red-500'}].map(x=><div key={x.l} className="bg-white rounded shadow p-3 text-center"><div className={`text-2xl font-bold ${x.c}`}>{x.v}</div><div className="text-xs text-gray-500">{x.l}</div></div>)}</div>
            {childNodes.length>0&&<div className="bg-white rounded shadow overflow-hidden mb-4"><div className="flex items-center justify-between px-4 py-2 bg-gray-50 border-b"><span className="font-semibold text-sm text-gray-700">📁 子節點 ({childNodes.length})</span><button onClick={()=>setShowNewN(true)} className="text-xs border rounded px-2 py-0.5 text-gray-600 hover:bg-gray-100">+ 新增</button></div>{childNodes.map(n=>{const cs=nodeStats(nodes||{},cards||{},n.id,statuses);const pct=cs.total>0?Math.round(cs.done/cs.total*100):0;return<div key={n.id} className="flex items-center gap-3 px-4 py-2.5 border-b hover:bg-indigo-50 cursor-pointer" onClick={()=>setCurNid(n.id)}><span className="text-base">📁</span><span className="font-semibold text-sm flex-1">{n.name}</span><span className="text-xs text-indigo-600 font-semibold">{cs.total}</span><span className="text-xs text-green-600">✅{cs.done}</span>{cs.overdue>0&&<span className="text-xs text-red-500">⚠{cs.overdue}</span>}<div style={{width:48}}><PBar pct={pct}/></div><span style={{fontSize:10,fontWeight:700,color:pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444',minWidth:28,textAlign:'right'}}>{pct}%</span><button onClick={e=>{e.stopPropagation();delNode(n.id);}} className="text-gray-200 hover:text-red-400 text-xs">✕</button><span className="text-gray-300 text-xs">›</span></div>;})}
            </div>}
            {view==='board'&&<div className="flex gap-3 overflow-x-auto pb-4">{(statuses||[]).map(st2=>(
              <BoardCol key={st2.id} st={st2} visCards={visCards} nodes={nodes||{}} curNodeId={curNid} statuses={statuses||[]} tagC={tagC||{}} members={members||[]} admins={admins||[]} curUser={curUser} updCard={updCard} setSelCard={setSelCard} handlePromote={handlePro} handleDemote={handleDem} arcCard={arcCard} delCard={delCard} dragCardId={dragCardId} setDragCardId={setDragCardId} isDropTarget={dropColId===st2.id} onDragEnterCol={handleBoardDragEnterCol} onDragLeaveCol={handleBoardDragLeaveCol}/>
            ))}</div>}
            {view==='list'&&<div className="space-y-3">{(statuses||[]).map(st2=>(
              <ListStatusGroup key={st2.id} st={st2} stCards={visCards.filter(c=>c.statusId===st2.id)} nodes={nodes||{}} curNid={curNid} statuses={statuses||[]} tagC={tagC||{}} members={members||[]} admins={admins||[]} curUser={curUser} setSelCard={setSelCard} handlePro={handlePro} handleDem={handleDem} arcCard={arcCard} delCard={delCard} updCard={updCard}/>
            ))}{!visCards.length&&<div className="bg-white rounded shadow text-center text-gray-400 py-16">沒有任務</div>}</div>}
            {view==='gantt'&&<GanttView cards={cards||{}} nodes={nodes||{}} nid={curNid} statuses={statuses||[]} onOpen={setSelCard} onDrop={onCardDrop} groupByChild={!!hasChildNodes}/>}
            {view==='calendar'&&<CalView cards={cards||{}} nodes={nodes||{}} nid={curNid} statuses={statuses||[]} tagC={tagC||{}} onOpen={setSelCard} addCard={curNid?(ds=>{const id='c_'+uid();const nc={id,name:'新任務',nodeId:curNid,statusId:(statuses||[])[0]?.id,urgency:'普通',assignee:curUser||'',follower:'',collaborators:[],startDate:today(),dueDate:ds,tags:[],docs:[],comments:[],createdAt:nowFull(),completedAt:null,subtasks:[],archived:false,projectNote:'',trackStart:''};updCard(id,nc,true);setTimeout(()=>setSelCard(nc),80);}):null}/>}
          </>}
          {view==='myWork'&&<MyWorkspace cards={cards||{}} nodes={nodes||{}} statuses={statuses||[]} tagC={tagC||{}} members={members||[]} admins={admins||[]} curUser={curUser} setSelCard={setSelCard}/>}
          {view==='weekly'&&<WeeklyView weekly={weekly||DEF_WEEKLY} setWeekly={setWeekly} members={members||[]}/>}
          {view==='quality'&&<QualityView quality={quality||[]} setQuality={setQuality} members={members||[]}/>}
        </div>
      </div>

      <QNPanel curUser={curUser}/>
      {syncCard&&<TaskModal task={syncCard} statuses={statuses||[]} tags={tags||[]} tagC={tagC||{}} members={members||[]} admins={admins||[]} rolePerms={rolePerms||DEF_ROLE_PERMS} updTask={updCard} onClose={()=>setSelCard(null)} curUser={curUser}/>}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} members={members||[]} setMembers={setMembers} statuses={statuses||[]} setStatuses={setStatuses} tags={tags||[]} tagC={tagC||{}} setTags={setTags} setTagC={setTagC} admins={admins||[]} setAdmins={setAdmins} rolePerms={rolePerms||DEF_ROLE_PERMS} setRolePerms={setRolePerms}/>}
      {showArchive&&<ArchiveModal cards={cards||{}} updCard={updCard} delCard={delCard} onClose={()=>setShowArchive(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

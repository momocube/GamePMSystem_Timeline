<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>枝幹時間軸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --bg:#ffffff;--surface:#ffffff;--surface2:#f7f6f3;--surface3:#efede9;
  --border:#e8e6e1;--border2:#f0ede8;
  --text:#37352f;--text-dim:#9b9a97;--text-mid:#6b6b6a;
  --accent:#d4900a;--blue:#2e75d4;--red:#e03e3e;--green:#0f7b6c;
  --notion-red:#fdecec;--notion-blue:#e7f0fd;--notion-green:#edf7f0;
  --notion-orange:#fef3e9;--notion-purple:#f4f0fd;--notion-pink:#fce8f0;
  --shadow:rgba(55,53,47,.08);--shadow2:rgba(55,53,47,.15);
  --DAY:88px;--trunk-h:44px;--branch-h:112px;--lcol-w:170px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}

/* ── HEADER ── */
header{height:48px;padding:0 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:30;}
.hdr-icon{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;}
.hdr-title{font-size:13px;font-weight:600;color:var(--text);}
.hdr-range{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.fpill{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .12s;font-family:'DM Mono',monospace;}
.fpill:hover{background:var(--surface2);color:var(--text-mid);}
.fpill.on{background:var(--text);color:#fff;border-color:var(--text);}
.hdr-sep{width:1px;height:20px;background:var(--border);}
.btn-members{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text-mid);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;}
.btn-members:hover{background:var(--surface3);}
.av-row{display:flex;}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid var(--surface);margin-left:-5px;cursor:pointer;transition:transform .12s,opacity .12s;flex-shrink:0;}
.av:first-child{margin-left:0;}
.av:hover{transform:scale(1.15);}
.av.muted{opacity:.22;}

/* ── LAYOUT ── */
#main{flex:1;display:flex;overflow:hidden;}
#lcol{width:var(--lcol-w);flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;z-index:20;}
#lspc{height:34px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;padding:0 10px;justify-content:space-between;}
#lspc-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);letter-spacing:.06em;}
#lbody{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#sa{flex:1;overflow-x:scroll;overflow-y:hidden;cursor:grab;position:relative;}
#sa.drag{cursor:grabbing;}
#sa::-webkit-scrollbar{height:4px;}
#sa::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#canvas{position:relative;height:100%;}
#ruler{height:34px;display:flex;align-items:flex-end;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:15;overflow:hidden;}
.rc{width:var(--DAY);flex-shrink:0;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);padding-bottom:5px;position:relative;}
.rc.ms{color:var(--text-mid);font-weight:600;}
.rc.td{color:var(--accent);font-weight:700;}
.rc.td::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
#tdline{position:absolute;top:34px;bottom:0;width:1px;background:var(--accent);opacity:.25;pointer-events:none;z-index:10;}
#tdline::before{content:'TODAY';position:absolute;top:8px;left:4px;font-family:'DM Mono',monospace;font-size:8px;color:var(--accent);opacity:.8;}
#rows{position:absolute;top:34px;left:0;right:0;bottom:0;display:flex;flex-direction:column;}

/* ── TRUNK ROW ── */
.trow{height:var(--trunk-h);position:relative;flex-shrink:0;border-bottom:1px solid var(--border2);display:flex;align-items:center;cursor:pointer;background:var(--surface);}
.trow:hover{background:var(--surface2);}
.tbar{position:absolute;height:4px;border-radius:2px;top:50%;transform:translateY(-50%);opacity:.35;}
.tpill{position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:9px;font-weight:600;white-space:nowrap;pointer-events:none;color:#fff;opacity:.55;}

/* ── BRANCH GROUP ── */
.bgroup{display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:height .26s cubic-bezier(.4,0,.2,1);background:var(--surface2);}
.brow{height:var(--branch-h);position:relative;flex-shrink:0;border-bottom:1px solid var(--border2);}
.brow.dimmed{opacity:.2;}
.bbar{position:absolute;height:4px;border-radius:2px;top:32px;opacity:.65;}

/* ── TREE BRANCH VISUAL ── */
.branch-vine{position:absolute;top:0;pointer-events:none;z-index:1;}
.branch-vine path{fill:none;stroke-linecap:round;animation:vineGrow .6s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes vineGrow{from{stroke-dashoffset:200;}to{stroke-dashoffset:0;}}
.branch-vine .vine-leaf{animation:leafPop .3s .5s cubic-bezier(.34,1.56,.64,1) forwards;transform-origin:center;opacity:0;}
@keyframes leafPop{from{opacity:0;transform:scale(0);}to{opacity:1;transform:scale(1);}}

.stem{position:absolute;width:2px;border-radius:1px;top:0;height:33px;opacity:.45;}
.bmark{position:absolute;top:14px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;z-index:3;}
.bmark-dot{width:7px;height:7px;border-radius:50%;border:2px solid var(--surface2);margin-bottom:2px;}
.bmark-date{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);background:var(--surface2);padding:1px 3px;border-radius:3px;border:1px solid var(--border);white-space:nowrap;}
.endlbl{position:absolute;top:16px;font-size:8px;font-family:'DM Mono',monospace;color:var(--text-dim);white-space:nowrap;}
.no-end-lbl{position:absolute;top:16px;font-size:8px;font-family:'DM Mono',monospace;color:var(--text-dim);font-style:italic;white-space:nowrap;}

/* ── NODE CARD ── */
.nwrap{position:absolute;top:6px;transform:translateX(-50%);z-index:6;cursor:pointer;}
.nwrap.hidden{display:none;}
.nav-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin:0 auto 3px;border:2px solid var(--surface2);box-shadow:0 1px 4px var(--shadow2);transition:transform .13s;color:#fff;flex-shrink:0;}
.nwrap:hover .nav-dot{transform:scale(1.2);}
.ncard{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 7px;box-shadow:0 1px 4px var(--shadow);transition:box-shadow .13s;width:128px;}
.nwrap:hover .ncard{box-shadow:0 3px 10px var(--shadow2);}
.ncwho{font-size:9px;font-weight:600;font-family:'DM Mono',monospace;margin-bottom:2px;display:flex;align-items:center;gap:4px;}
.ncmsg{font-size:10px;color:var(--text-mid);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:112px;}
.ncdate{font-size:8px;font-family:'DM Mono',monospace;color:var(--text-dim);margin-top:2px;}
.ncthumb{width:100%;height:48px;object-fit:cover;border-radius:3px;margin-top:4px;border:1px solid var(--border);}
.ncmore{font-size:8px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:right;margin-top:1px;}
.ntype-badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;margin-bottom:3px;font-weight:500;}
/* trip card special */
.nc-trip-loc{font-size:9px;color:var(--text-mid);display:flex;align-items:center;gap:2px;margin-top:2px;}

/* ── LEFT COLUMN LABELS ── */
.lc-trunk{height:var(--trunk-h);display:flex;align-items:center;padding:0 10px;gap:6px;border-bottom:1px solid var(--border2);cursor:pointer;flex-shrink:0;user-select:none;background:var(--surface);transition:background .12s;}
.lc-trunk:hover{background:var(--surface2);}
.lc-caret{font-size:8px;color:var(--text-dim);transition:transform .2s;flex-shrink:0;}
.lc-caret.open{transform:rotate(90deg);}
.lc-tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lc-tname{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.lc-bg{display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:height .26s cubic-bezier(.4,0,.2,1);background:var(--surface2);}
.lc-br{height:var(--branch-h);display:flex;flex-direction:column;justify-content:flex-start;padding:8px 9px 7px 18px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.lc-brtop{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.lc-brdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.lc-brname{font-size:10px;color:var(--text-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.lc-duration{font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);margin-bottom:5px;}
/* progress row */
.lc-prog-row{display:flex;align-items:center;gap:5px;}
.lc-pbar{flex:1;height:4px;border-radius:2px;background:var(--border);overflow:visible;cursor:pointer;position:relative;}
.lc-pfill{height:100%;border-radius:2px;transition:width .3s;}
.lc-pct{font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);cursor:pointer;min-width:26px;text-align:right;}
.lc-pct:hover{color:var(--text-mid);}
.lc-no-end{font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);font-style:italic;}
/* collaborators mini row */
.lc-collabs{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap;}

/* ── ADD TRUNK/BRANCH BUTTONS ── */
.lc-add-trunk{height:32px;display:flex;align-items:center;padding:0 10px;gap:5px;cursor:pointer;font-size:10px;color:var(--text-dim);transition:all .12s;border-bottom:1px solid var(--border2);flex-shrink:0;}
.lc-add-trunk:hover{background:var(--surface2);color:var(--text-mid);}
.lc-add-branch{height:28px;display:flex;align-items:center;padding:0 18px;gap:5px;cursor:pointer;font-size:9px;color:var(--text-dim);transition:all .12s;border-bottom:1px solid var(--border2);flex-shrink:0;}
.lc-add-branch:hover{background:var(--surface3);color:var(--text-mid);}

/* ── BOTTOM PANEL ── */
#bot{height:1px;background:var(--border);flex-shrink:0;}
#rp{height:204px;flex-shrink:0;background:var(--surface);display:flex;border-top:1px solid var(--border);}
.rpc{padding:12px 13px;border-right:1px solid var(--border);}
.rl{font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);letter-spacing:.06em;margin-bottom:6px;}
select,textarea,input[type=date],input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;transition:border-color .13s;width:100%;}
select:focus,textarea:focus,input:focus{border-color:#9b9a97;}
select{padding:5px 7px;cursor:pointer;}
.tbts{display:flex;flex-direction:column;gap:3px;}
.tbt{padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;text-align:left;font-family:'Noto Sans TC',sans-serif;transition:all .12s;}
.tbt:hover{background:var(--surface2);color:var(--text-mid);}
.tbt.on{border-color:var(--text);color:var(--text);background:var(--surface2);}
#rmsgcol{flex:1;display:flex;flex-direction:column;}
#rmsginner{flex:1;display:flex;flex-direction:column;gap:4px;}
#rmsg{flex:1;padding:7px 9px;resize:none;line-height:1.55;border-radius:4px;}
#msdrow{display:none;}
#msdrow.show{display:block;}
/* trip template */
#trip-fields{display:none;flex:1;flex-direction:column;gap:3px;}
#trip-fields.show{display:flex;}
#trip-fields input,#trip-fields textarea{padding:5px 7px;font-size:11px;border-radius:4px;}
#trip-fields textarea{resize:none;min-height:28px;line-height:1.4;}
#trip-fields .trip-label{font-size:9px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.trip-row{display:flex;gap:4px;align-items:center;}
.trip-row input{flex:1;}

#iuparea{border:1px dashed var(--border);border-radius:4px;padding:4px 8px;font-size:10px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:5px;transition:border-color .12s;flex-shrink:0;}
#iuparea:hover{border-color:var(--text-dim);}
#ipreviews{display:flex;gap:3px;flex-wrap:wrap;}
.ipt{width:30px;height:30px;object-fit:cover;border-radius:3px;border:1px solid var(--border);}
.iprm{position:absolute;top:-3px;right:-3px;width:13px;height:13px;border-radius:50%;background:var(--red);color:#fff;font-size:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--surface);}
.ipwrap{position:relative;}
/* collab picker in report panel */
#rp-collab-col{padding:12px 13px;border-right:1px solid var(--border);width:130px;}
.collab-picks{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.collab-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;cursor:pointer;color:#fff;transition:transform .12s,opacity .12s;border:2px solid transparent;}
.collab-av.selected{border-color:var(--text);}
.collab-av:hover{transform:scale(1.15);}
#subco{width:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;}
.subbt{width:50px;height:50px;border-radius:50%;border:none;background:var(--text);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s,box-shadow .12s;box-shadow:0 3px 9px var(--shadow2);}
.subbt:hover{transform:scale(1.09);box-shadow:0 5px 14px var(--shadow2);}
.subbt:active{transform:scale(.93);}
.subhi{font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);}

/* ── MODALS shared ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(55,53,47,.35);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:8px;border:1px solid var(--border);box-shadow:0 8px 32px var(--shadow2);animation:mIn .16s ease;overflow:hidden;}
@keyframes mIn{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-hdr{padding:14px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.mclose{margin-left:auto;width:22px;height:22px;border-radius:4px;background:transparent;border:1px solid var(--border);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:background .12s;}
.mclose:hover{background:var(--surface2);}

/* ── NODE DETAIL / EDIT MODAL ── */
#nmodal .modal-box{width:460px;max-width:92vw;}
#nmod-slides{position:relative;background:var(--surface3);height:0;overflow:hidden;transition:height .18s;}
#nmod-slides.has{height:190px;}
#nmod-img{width:100%;height:190px;object-fit:contain;display:block;}
.slbt{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--border);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .12s;box-shadow:0 1px 5px var(--shadow);}
.slbt:hover{background:#fff;}
#slprev{left:8px;}#slnext{right:8px;}
#slctr{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);background:rgba(255,255,255,.85);padding:2px 6px;border-radius:8px;}
#nmod-body{padding:14px 16px;}
.nmod-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.nmod-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.nmod-right{flex:1;}
.nmod-who{font-size:12px;font-weight:600;margin-bottom:2px;}
.nmod-branch{font-size:10px;color:var(--text-dim);margin-bottom:8px;}
textarea.nmod-edit{width:100%;min-height:60px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font-size:12px;line-height:1.6;resize:vertical;font-family:'Noto Sans TC',sans-serif;}
textarea.nmod-edit:focus{border-color:#9b9a97;outline:none;}
.nmod-meta{display:flex;align-items:center;gap:8px;margin-top:8px;}
.nmod-date{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.nmod-collabs{display:flex;gap:3px;}
.nmod-save{padding:5px 14px;border-radius:4px;border:none;background:var(--text);color:#fff;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-left:auto;transition:opacity .12s;}
.nmod-save:hover{opacity:.8;}
/* image upload in modal */
#nmod-img-upload{border:1px dashed var(--border);border-radius:4px;padding:4px 8px;font-size:10px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:5px;margin-top:6px;transition:border-color .12s;}
#nmod-img-upload:hover{border-color:var(--text-dim);}
#nmod-img-previews{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}

/* ── MEMBER MANAGER MODAL ── */
#mmmodal .modal-box{width:380px;max-width:92vw;}
#mmmodal .modal-hdr .title{font-size:13px;font-weight:600;}
#mm-list{padding:10px 16px;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.mm-row{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);}
.mm-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.mm-name{flex:1;font-size:12px;font-weight:500;}
.mm-color{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);cursor:pointer;}
.mm-del{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text-dim);font-size:11px;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.mm-del:hover{background:var(--notion-red);color:var(--red);}
#mm-add{margin:8px 16px 14px;display:flex;gap:6px;}
#mm-add input{flex:1;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;outline:none;}
#mm-add input:focus{border-color:#9b9a97;}
.mm-addbt{padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text-mid);font-size:11px;cursor:pointer;white-space:nowrap;transition:background .12s;}
.mm-addbt:hover{background:var(--surface3);}

/* ── ADD TRUNK/BRANCH MODAL ── */
#add-modal .modal-box{width:340px;max-width:90vw;}
#add-modal .modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
#add-modal label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;display:block;margin-bottom:4px;}
#add-modal input[type=text]{padding:6px 8px;border-radius:4px;}
#add-modal input[type=date]{padding:5px 7px;border-radius:4px;}
.add-color-row{display:flex;align-items:center;gap:8px;}
.add-color-row input[type=color]{width:36px;height:28px;padding:2px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;}
.add-color-preview{width:80px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;}
.add-submit{padding:7px 16px;border-radius:5px;border:none;background:var(--text);color:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .12s;align-self:flex-end;}
.add-submit:hover{opacity:.8;}

/* ── PROGRESS EDIT POPOVER ── */
#prog-pop{display:none;position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px var(--shadow2);padding:10px 12px;width:160px;}
#prog-pop.open{display:block;}
#prog-pop label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
#prog-pop input[type=range]{width:100%;margin-bottom:4px;}

<script>

let NODES = [
  {id:1, trunk:'game',branch:'core', type:'update',   date:'2024-03-05',member:'M',collaborators:[],msg:'完成基礎移動系統，跳躍手感已調整',images:[],tripData:null},
  {id:2, trunk:'game',branch:'core', type:'update',   date:'2024-03-18',member:'K',collaborators:['M'],msg:'碰撞偵測初版完成，邊緣案例待修',images:[],tripData:null},
  {id:3, trunk:'art', branch:'ui',   type:'update',   date:'2024-03-12',member:'L',collaborators:[],msg:'主選單草稿設計完成，等候確認',images:[],tripData:null},
  {id:4, trunk:'game',branch:'core', type:'milestone',date:'2024-04-01',member:'M',collaborators:['K','L'],msg:'核心玩法 Alpha 版本完成，可內部試玩',images:[],tripData:null},

  {id:6, trunk:'art', branch:'ui',   type:'meeting',  date:'2024-04-05',member:'L',collaborators:['M','K'],msg:'UI Review 確認風格方向',images:[],tripData:null},
  {id:7, trunk:'game',branch:'core', type:'update',   date:'2024-04-12',member:'K',collaborators:[],msg:'敵人 AI 基礎行為完成',images:[],tripData:null},
  {id:8, trunk:'game',branch:'lvl',  type:'update',   date:'2024-04-08',member:'T',collaborators:[],msg:'第一章關卡佈局完成',images:[],tripData:null},
  {id:9, trunk:'game',branch:'vfx',  type:'update',   date:'2024-04-18',member:'M',collaborators:['T'],msg:'命中特效第一版，粒子數待優化',images:[],tripData:null},
  {id:10,trunk:'art', branch:'audio',type:'milestone',date:'2024-04-15',member:'R',collaborators:[],msg:'音效庫基礎建立完成，共 42 個音效',images:[],tripData:null},
];
let NC=100;
const exp={};TRUNKS.forEach(t=>exp[t.id]=false);
let activeType='all',activeMems=new Set(),pendImgs=[],editImgs=[];
let currentNodeId=null,slIdx=0,slImgs=[];
let progTarget=null;
let addMode='trunk'; // 'trunk' or 'branch'
let addParentTrunkId=null;

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const dx  = d => (new Date(d)-START)/86400000*DP;
const tw  = () => (END-START)/86400000*DP+32*DP;
const fmt = d => { const dt=new Date(d); return`${dt.getMonth()+1}/${dt.getDate()}`; };
const BH  = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--branch-h'));
const mem = id => MEMBERS.find(m=>m.id===id)||{name:'?',color:'#aaa'};
const branch = id => TRUNKS.flatMap(t=>t.branches).find(b=>b.id===id);
const calcDuration = b => {
  if(b.noEnd||!b.end) return null;
  const days=Math.round((new Date(b.end)-new Date(b.start))/86400000);
  return days;
};

function initials(name){ return name.slice(0,1).toUpperCase(); }

// Color utility: derive branch colors from trunk color (lighter shade)
function hexToHSL(hex){
  hex=hex.replace('#','');
  const r=parseInt(hex.substring(0,2),16)/255;
  const g=parseInt(hex.substring(2,4),16)/255;
  const b=parseInt(hex.substring(4,6),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function hslToHex(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return`#${f(0)}${f(8)}${f(4)}`;
}
function getBranchColor(trunkColor, index){
  const hsl=hexToHSL(trunkColor);
  // lighter, slightly shifted for each branch
  const lightness=Math.min(hsl.l+15+index*5, 82);
  const saturation=Math.max(hsl.s-5, 20);
  return hslToHex(hsl.h, saturation, lightness);
}
function getTrunkDarkColor(trunkColor){
  const hsl=hexToHSL(trunkColor);
  return hslToHex(hsl.h, Math.min(hsl.s+5,90), Math.max(hsl.l-8,25));
}

function makeAv(memberId, size=22, extraStyle=''){
  const m=mem(memberId);
  const d=document.createElement('div');
  d.className='av';
  d.style.cssText=`width:${size}px;height:${size}px;background:${m.color};font-size:${Math.floor(size*0.38)}px;${extraStyle}`;
  d.textContent=initials(m.name);
  d.title=m.name;
  return d;
}

// ─────────────────────────────────────────────
// RULER
// ─────────────────────────────────────────────
function buildRuler(){
  const el=document.getElementById('ruler');el.innerHTML='';
  const days=Math.ceil((END-START)/86400000+32);
  for(let i=0;i<=days;i++){
    const d=new Date(START);d.setDate(d.getDate()+i);
    const c=document.createElement('div');c.className='rc';
    if(d.toDateString()===TODAY.toDateString())c.classList.add('td');
    if(d.getDate()===1){c.classList.add('ms');c.textContent=`${d.getMonth()+1}月`;}
    else if(d.getDay()===1||i===0)c.textContent=`${d.getDate()}`;
    el.appendChild(c);
  }
}

// ─────────────────────────────────────────────
// MEMBER AVATARS in header
// ─────────────────────────────────────────────
function buildHeaderAvatars(){
  const c=document.getElementById('mavs');c.innerHTML='';
  MEMBERS.forEach(m=>{
    const a=document.createElement('div');
    a.className='av'+(activeMems.has(m.id)?' muted':'');
    a.style.cssText=`background:${m.color};`;
    a.textContent=initials(m.name);a.title=m.name;
    a.dataset.m=m.id;
    a.addEventListener('click',()=>{
      if(activeMems.has(m.id))activeMems.delete(m.id);
      else activeMems.add(m.id);
      buildHeaderAvatars();applyF();
    });
    c.appendChild(a);
  });
}

// ─────────────────────────────────────────────
// REPORT PANEL SELECTS
// ─────────────────────────────────────────────
function buildSelects(){
  const br=document.getElementById('rpbr');br.innerHTML='';
  TRUNKS.forEach(t=>t.branches.forEach(b=>{
    const o=document.createElement('option');o.value=b.id;

function buildCollabPicks(){

    if(m.id===reporterId)return;
    const a=document.createElement('div');

// ─────────────────────────────────────────────
// LEFT COLUMN LABELS
// ─────────────────────────────────────────────
function buildLabels(){
  const body=document.getElementById('lbody');body.innerHTML='';
  TRUNKS.forEach((t,ti)=>{
    const trunkDark=getTrunkDarkColor(t.color);
    const tr=document.createElement('div');tr.className='lc-trunk';tr.dataset.trunk=t.id;
    const ca=document.createElement('span');ca.className='lc-caret'+(exp[t.id]?' open':'');ca.textContent='▶';
    const dt=document.createElement('span');dt.className='lc-tdot';dt.style.background=trunkDark;
    const nm=document.createElement('span');nm.className='lc-tname';nm.style.color=trunkDark;nm.textContent=t.name;
    tr.append(ca,dt,nm);tr.addEventListener('click',()=>toggle(t.id));body.appendChild(tr);

    const bg=document.createElement('div');bg.className='lc-bg';bg.dataset.trunk=t.id;
    const branchCount=t.branches.length;
    bg.style.height=exp[t.id]?(branchCount*BH()+28)+'px':'0px';
    t.branches.forEach((b,bi)=>{
      const bColor=getBranchColor(t.color, bi);
      const br=document.createElement('div');br.className='lc-br';
      const top=document.createElement('div');top.className='lc-brtop';
      const bd=document.createElement('div');bd.className='lc-brdot';bd.style.background=bColor;
      const bn=document.createElement('div');bn.className='lc-brname';bn.textContent=b.name;
      top.append(bd,bn);br.appendChild(top);
      const dur=calcDuration(b);
      const durEl=document.createElement('div');durEl.className='lc-duration';
      durEl.textContent=dur!=null?`⏱ ${dur} 天`:'⏱ 無截止日';
      br.appendChild(durEl);
      const progRow=document.createElement('div');progRow.className='lc-prog-row';
      const pbar=document.createElement('div');pbar.className='lc-pbar';
      pbar.title='點擊調整進度';
      const pfill=document.createElement('div');pfill.className='lc-pfill';pfill.style.cssText=`width:${b.prog}%;background:${bColor}`;
      pbar.appendChild(pfill);
      const pct=document.createElement('div');pct.className='lc-pct';pct.textContent=`${b.prog}%`;
      pbar.addEventListener('click',e=>openProgPop(e,t.id,b.id));
      pct.addEventListener('click',e=>openProgPop(e,t.id,b.id));
      progRow.append(pbar,pct);br.appendChild(progRow);
      const collabs=document.createElement('div');collabs.className='lc-collabs';
      const seenM=new Set();
      NODES.filter(n=>n.branch===b.id).forEach(n=>{
        [n.member,...(n.collaborators||[])].forEach(mid=>{
          if(!seenM.has(mid)){seenM.add(mid);collabs.appendChild(makeAv(mid,16));}
        });
      });
      br.appendChild(collabs);
      bg.appendChild(br);
    });
    // add branch button
    const addBr=document.createElement('div');addBr.className='lc-add-branch';
    addBr.innerHTML='<span style="font-size:12px;">+</span> 新增枝幹';
    addBr.addEventListener('click',e=>{e.stopPropagation();openAddModal('branch',t.id);});
    bg.appendChild(addBr);
    body.appendChild(bg);
  });
  // add trunk button
  const addTr=document.createElement('div');addTr.className='lc-add-trunk';
  addTr.innerHTML='<span style="font-size:13px;">+</span> 新增主幹';
  addTr.addEventListener('click',()=>openAddModal('trunk'));
  body.appendChild(addTr);
}

// ─────────────────────────────────────────────
// TIMELINE
// ─────────────────────────────────────────────
function buildTimeline(){
  const rows=document.getElementById('rows');rows.innerHTML='';
  TRUNKS.forEach((t,ti)=>{
    const trunkDark=getTrunkDarkColor(t.color);
    const tr=document.createElement('div');tr.className='trow';tr.dataset.trunk=t.id;
    const bar=document.createElement('div');bar.className='tbar';
    bar.style.cssText=`left:${dx(t.start)}px;width:${dx(t.end)-dx(t.start)}px;background:${trunkDark}`;
    tr.appendChild(bar);
    if(!exp[t.id])addPills(tr,t);
    tr.addEventListener('click',()=>toggle(t.id));rows.appendChild(tr);

    const bg=document.createElement('div');bg.className='bgroup';bg.dataset.trunk=t.id;
    bg.style.height=exp[t.id]?t.branches.length*BH()+'px':'0px';
    t.branches.forEach((b,bi)=>{
      const bColor=getBranchColor(t.color, bi);
      const brow=document.createElement('div');brow.className='brow';brow.dataset.branch=b.id;

      // ── TREE BRANCH VINE (SVG curved path) ──
      const vineStartX=dx(t.start)+((dx(t.end)-dx(t.start))*0.05)+bi*30;
      const branchStartX=dx(b.start);
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('class','branch-vine');
      const svgW=Math.max(branchStartX+20, vineStartX+80);
      svg.setAttribute('width',svgW);svg.setAttribute('height','40');
      svg.style.left='0px';svg.style.top='0px';
      // curved path from trunk area down to branch start
      const x1=vineStartX, y1=0;
      const x2=branchStartX, y2=33;
      const cp1x=x1, cp1y=y1+18;
      const cp2x=x2-15, cp2y=y2-5;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`);
      path.setAttribute('stroke',bColor);
      path.setAttribute('stroke-width','2.5');
      path.setAttribute('opacity','0.6');
      const pathLen=200;
      path.setAttribute('stroke-dasharray',pathLen);
      path.setAttribute('stroke-dashoffset',pathLen);
      svg.appendChild(path);
      // small circle "bud" at the end
      const bud=document.createElementNS('http://www.w3.org/2000/svg','circle');
      bud.setAttribute('cx',x2);bud.setAttribute('cy',y2);bud.setAttribute('r','4');
      bud.setAttribute('fill',bColor);bud.setAttribute('class','vine-leaf');
      svg.appendChild(bud);
      // small circle at trunk connection
      const root=document.createElementNS('http://www.w3.org/2000/svg','circle');
      root.setAttribute('cx',x1);root.setAttribute('cy',y1);root.setAttribute('r','3');
      root.setAttribute('fill',trunkDark);root.setAttribute('opacity','0.5');
      svg.appendChild(root);
      brow.appendChild(svg);

      // start marker
      const mk=document.createElement('div');mk.className='bmark';mk.style.left=dx(b.start)+'px';
      const mkd=document.createElement('div');mkd.className='bmark-dot';mkd.style.background=bColor;
      const mklbl=document.createElement('div');mklbl.className='bmark-date';mklbl.textContent=fmt(b.start);
      mk.append(mkd,mklbl);brow.appendChild(mk);
      // bar
      const bb=document.createElement('div');bb.className='bbar';
      if(b.noEnd||!b.end){
        const w=tw()-dx(b.start);
        bb.style.cssText=`left:${dx(b.start)}px;width:${w}px;background:${bColor};opacity:.4;
          background:repeating-linear-gradient(90deg,${bColor} 0,${bColor} 8px,transparent 8px,transparent 14px);`;
        const noEndLbl=document.createElement('div');noEndLbl.className='no-end-lbl';
        noEndLbl.style.left=(dx(b.start)+8)+'px';noEndLbl.textContent='進行中…';brow.appendChild(noEndLbl);
      } else {
        bb.style.cssText=`left:${dx(b.start)}px;width:${dx(b.end)-dx(b.start)}px;background:${bColor}`;
        const el=document.createElement('div');el.className='endlbl';
        el.style.left=(dx(b.end)+4)+'px';el.textContent=fmt(b.end);brow.appendChild(el);
        const daysLeft=(new Date(b.end)-TODAY)/86400000;
        if(daysLeft>0&&daysLeft<14){
          const dw=document.createElement('div');
          dw.style.cssText=`position:absolute;height:4px;top:32px;border-radius:0 2px 2px 0;width:14px;left:${dx(b.end)-12}px;background:repeating-linear-gradient(45deg,#e03e3e,#e03e3e 3px,transparent 3px,transparent 6px);opacity:.7`;
          brow.appendChild(dw);
        }
      }
      brow.appendChild(bb);
      NODES.filter(n=>n.branch===b.id).forEach(n=>addCard(n,brow,t.color,bi));
      bg.appendChild(brow);
    });
    rows.appendChild(bg);
  });
  applyF();
}

function addPills(tr,trunk){
  trunk.branches.forEach((b,bi)=>{
    const bColor=getBranchColor(trunk.color, bi);
    const p=document.createElement('div');p.className='tpill';

    p.textContent=b.name;tr.appendChild(p);
  });

function addCard(n,brow,trunkColor,branchIdx){
  const m=mem(n.member);
  const icon=n.type==='milestone'?'🏁':n.type==='meeting'?'📅':n.type==='trip'?'✈️':'📝';
  const w=document.createElement('div');
  w.className='nwrap';w.dataset.id=n.id;w.dataset.type=n.type;w.dataset.member=n.member;
  w.style.left=dx(n.date)+'px';

  const avDot=document.createElement('div');
  avDot.className='nav-dot';
  avDot.style.background=m.color;
  avDot.textContent=initials(m.name);
  avDot.title=m.name;

  const card=document.createElement('div');card.className='ncard';
  let imgH='';
  if(n.images&&n.images.length>0){
    imgH=`<img class="ncthumb" src="${n.images[0]}">`;
    if(n.images.length>1)imgH+=`<div class="ncmore">+${n.images.length-1}</div>`;
  }
  // simplified collaborator display: just small dots, no names
  let collabH='';
  if(n.collaborators&&n.collaborators.length>0){
    collabH='<div style="display:flex;gap:1px;margin-top:2px;align-items:center;">';
    n.collaborators.slice(0,4).forEach(cid=>{
      const cm=mem(cid);
      collabH+=`<div style="width:10px;height:10px;border-radius:50%;background:${cm.color};" title="${cm.name}"></div>`;
    });
    if(n.collaborators.length>4) collabH+=`<span style="font-size:7px;color:var(--text-dim);">+${n.collaborators.length-4}</span>`;
    collabH+='</div>';
  }

  // For trip type: show location and member compactly
  if(n.type==='trip' && n.tripData){
    card.innerHTML=`<div class="ncwho" style="color:${m.color}">${icon}<span style="font-size:8px;">${initials(m.name)}</span></div><div class="nc-trip-loc">📍 ${n.tripData.location||'—'}</div><div class="ncmsg">${n.msg}</div><div class="ncdate">${fmt(n.date)}</div>${collabH}${imgH}`;
  } else {
    // Simplified: icon + initials only, no full name
    card.innerHTML=`<div class="ncwho" style="color:${m.color}">${icon}<span style="font-size:8px;">${initials(m.name)}</span></div><div class="ncmsg">${n.msg}</div><div class="ncdate">${fmt(n.date)}</div>${collabH}${imgH}`;
  }
  w.append(avDot,card);
  w.addEventListener('click',()=>openNodeModal(n.id));
  brow.appendChild(w);return w;
}

document.getElementById('subbt').addEventListener('click',()=>{
  const bid=document.getElementById('rpbr').value;
  const mk=document.getElementById('rprep').value;
  const tb=document.querySelector('.tbt.on');const type=tb?tb.dataset.type:'update';
  const di=document.getElementById('msdate').value;

  let msg='';
  let tripData=null;

  if(type==='trip'){
    const loc=document.getElementById('trip-loc').value.trim();
    const item=document.getElementById('trip-item').value.trim();
    const progress=document.getElementById('trip-progress').value.trim();
    const block=document.getElementById('trip-block').value.trim();
    const need=document.getElementById('trip-need').value.trim();
    const incident=document.getElementById('trip-incident').value.trim();
    if(!loc){
      document.getElementById('trip-loc').style.borderColor='#e03e3e';
      setTimeout(()=>document.getElementById('trip-loc').style.borderColor='',800);
      return;
    }
    tripData={location:loc,item,progress,block,need,incident};
    const parts=[];
    parts.push(`📍 ${loc}`);
    if(item) parts.push(`處理：${item}`);
    if(progress) parts.push(`進展：${progress}`);
    if(block) parts.push(`卡點：${block}`);
    if(need) parts.push(`需求：${need}`);
    if(incident) parts.push(`突發：${incident}`);
    msg=parts.join(' ｜ ');
  } else {
    msg=document.getElementById('rmsg').value.trim();
  }

  if(!msg){const ta=document.getElementById('rmsg');ta.style.borderColor=MEMBERS[0]&&MEMBERS[0].color||'#f00';setTimeout(()=>ta.style.borderColor='',800);return;}
  const dateStr=(type!=='update'&&di)?di:TODAY.toISOString().split('T')[0];
  let tid=null;for(const t of TRUNKS){if(t.branches.find(b=>b.id===bid)){tid=t.id;break;}}
  const collabs=[...document.querySelectorAll('.collab-av.selected')].map(a=>a.dataset.m);
  const nn={id:++NC,trunk:tid,branch:bid,type,date:dateStr,member:mk,collaborators:collabs,msg,images:[...pendImgs],tripData};
  NODES.push(nn);pendImgs=[];renderPendPrev();
  if(!exp[tid])toggle(tid);
  const br=document.querySelector(`.brow[data-branch="${bid}"]`);
  if(br){
    const t=TRUNKS.find(tr=>tr.id===tid);
    const bi=t?t.branches.findIndex(b=>b.id===bid):0;
    const w=addCard(nn,br,t?t.color:'#aaa',bi);w.classList.add('new');applyF();
  }
  buildLabels();
  // reset fields
  document.getElementById('rmsg').value='';
  if(type==='trip'){
    ['trip-loc','trip-item','trip-progress','trip-block','trip-need','trip-incident'].forEach(id=>document.getElementById(id).value='');
  }
  document.querySelectorAll('.collab-av').forEach(a=>a.classList.remove('selected'));
  const sb=document.getElementById('subbt');sb.style.background='#6aaa82';sb.textContent='✓';
  setTimeout(()=>{sb.style.background='var(--text)';sb.textContent='↑';},800);
});

  sa.addEventListener('touchmove',e=>{sa.scrollLeft=sl-(e.touches[0].clientX-sx);},{passive:true});
})();

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render(){
  document.getElementById('canvas').style.width=tw()+'px';
  buildRuler();buildHeaderAvatars();buildLabels();buildTimeline();buildSelects();
  document.getElementById('tdline').style.left=dx(TODAY.toISOString().split('T')[0])+'px';
  const sa=document.getElementById('sa');
  sa.scrollLeft=dx(TODAY.toISOString().split('T')[0])-sa.clientWidth*.35;
}
render();
</script>
